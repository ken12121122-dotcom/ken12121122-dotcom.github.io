plugins {
    id 'com.android.application'
}

android {
    namespace 'com.amin.pocketgba'
    compileSdk 35

    defaultConfig {
        applicationId 'com.amin.pocketgba'
        minSdk 26
        targetSdk 35
        versionCode 91
        versionName '0.9.1'
        manifestPlaceholders = [appLabel: 'Amin Pocket GBA']
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        debug {
            applicationIdSuffix '.preview091'
            versionNameSuffix '-preview'
            manifestPlaceholders = [appLabel: 'Amin Pocket GBA Preview']
        }
        release {
            minifyEnabled false
            manifestPlaceholders = [appLabel: 'Amin Pocket GBA']
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lint {
        abortOnError true
        checkReleaseBuilds true
    }
}
