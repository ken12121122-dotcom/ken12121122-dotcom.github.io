name: Build Amin Pocket GBA Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.css'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-*.js'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/native-release-manifest.json'
      - 'amin-vault/sw.js'
      - 'tests/*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.css'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-*.js'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/native-release-manifest.json'
      - 'amin-vault/sw.js'
      - 'tests/*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-js-tests:
    name: Discover JavaScript tests
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.list.outputs.files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: List test files
        id: list
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          files = sorted(str(path) for path in Path('tests').glob('*.test.mjs'))
          if not files:
              raise SystemExit('No tests/*.test.mjs files found')
          print('files=' + json.dumps(files, separators=(',', ':')))
          PY

  js-tests:
    name: JS test · ${{ matrix.file }}
    needs: discover-js-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.discover-js-tests.outputs.files) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run ${{ matrix.file }}
        run: node --test "${{ matrix.file }}"

  android-ci:
    name: Android build, lint and APK inspection
    needs: js-tests
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Validate JavaScript and JSON syntax
        shell: bash
        run: |
          set -euxo pipefail
          for file in \
            amin-vault/gba.js \
            amin-vault/gba-save-guard.js \
            amin-vault/gba-save-migration.js \
            amin-vault/amin-backup-v2.js \
            amin-vault/amin-diagnostics.js \
            amin-vault/runtime-updater.js \
            amin-vault/sw.js
          do
            echo "Checking $file"
            test -s "$file"
            node --check "$file"
          done
          python3 -m json.tool amin-vault/runtime-manifest.json >/dev/null
          python3 -m json.tool amin-vault/native-release-manifest.json >/dev/null

      - name: Validate manifest and Android contracts
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import urlparse

          root = Path('amin-vault')
          runtime = json.loads((root / 'runtime-manifest.json').read_text(encoding='utf-8'))
          native = json.loads((root / 'native-release-manifest.json').read_text(encoding='utf-8'))
          gradle = Path('android-native/app/build.gradle').read_text(encoding='utf-8')

          print('runtimeVersion:', runtime.get('runtimeVersion'))
          print('native release:', native.get('latestVersionName'), native.get('latestVersionCode'))

          assert runtime.get('runtimeVersion'), 'runtimeVersion is required'
          assert isinstance(runtime.get('optionalCapabilities', []), list), 'optionalCapabilities must be a list'
          assert native.get('format') == 'amin-native-release-manifest', 'invalid native manifest format'
          assert native.get('channel') == 'bridge', 'native channel must be bridge'
          assert native.get('packageId') == 'com.amin.pocketgba', 'unexpected packageId'
          assert isinstance(native.get('enabled'), bool), 'enabled must be boolean'
          assert isinstance(native.get('latestVersionCode'), int), 'latestVersionCode must be integer'
          assert native.get('latestVersionCode', 0) >= native.get('minimumSupportedVersionCode', 0), 'latestVersionCode is below minimumSupportedVersionCode'
          assert native.get('minimumAndroidSdk', 0) >= 26, 'minimumAndroidSdk is below supported floor'

          if native['enabled']:
              version_name = native.get('latestVersionName', '')
              apk_url = native.get('apkUrl', '')
              apk_sha = native.get('apkSha256', '')
              assert version_name.startswith('0.9.2-bridge'), 'unexpected native version name'
              assert urlparse(apk_url).scheme == 'https', 'APK URL must use HTTPS'
              assert version_name in Path(urlparse(apk_url).path).name, 'APK filename does not contain version name'
              assert len(apk_sha) == 64 and all(c in '0123456789abcdef' for c in apk_sha.lower()), 'invalid APK SHA-256'
              assert native.get('sizeBytes', 0) > 0, 'APK size must be positive'

          for marker in (
              "applicationId 'com.amin.pocketgba'",
              'compileSdk 35',
              'targetSdk 35',
              'bridge {',
              'signingConfig signingConfigs.release',
          ):
              assert marker in gradle, f'missing Gradle contract: {marker}'
          assert 'applicationIdSuffix' not in gradle, 'production package must not use applicationIdSuffix'
          PY

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run unit tests, build and lint
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            :app:testDebugUnitTest \
            :app:assembleDebug \
            :app:lintDebug

      - name: Inspect current APK
        id: inspect
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"

          test -s "$APK"
          "$AAPT" dump badging "$APK" | tee /tmp/apk-badging.txt
          "$AAPT" dump permissions "$APK" | tee /tmp/apk-permissions.txt
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee /tmp/apk-manifest.txt

          PACKAGE_NAME="$(sed -n "s/^package: name='\([^']*\)'.*/\1/p" /tmp/apk-badging.txt | head -n 1)"
          VERSION_CODE="$(sed -n "s/^package:.*versionCode='\([^']*\)'.*/\1/p" /tmp/apk-badging.txt | head -n 1)"
          VERSION_NAME="$(sed -n "s/^package:.*versionName='\([^']*\)'.*/\1/p" /tmp/apk-badging.txt | head -n 1)"
          LABEL="$(sed -n "s/^application-label:'\(.*\)'/\1/p" /tmp/apk-badging.txt | head -n 1)"

          test "$PACKAGE_NAME" = 'com.amin.pocketgba'
          test -n "$VERSION_CODE"
          test -n "$VERSION_NAME"
          case "$LABEL" in
            'Amin Pocket GBA'*) ;;
            *) echo "Unexpected application label: $LABEL" >&2; exit 1 ;;
          esac

          for permission in \
            android.permission.INTERNET \
            android.permission.ACCESS_NETWORK_STATE \
            android.permission.VIBRATE \
            android.permission.REQUEST_INSTALL_PACKAGES
          do
            grep -q "$permission" /tmp/apk-permissions.txt
          done
          ! grep -q 'android.permission.MANAGE_EXTERNAL_STORAGE' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.CAMERA' /tmp/apk-permissions.txt

          for component in \
            AminPocketApplication \
            LaunchGateActivity \
            ControlCenterActivity \
            MainActivity \
            PermissionCenterActivity \
            UpdateHubActivity
          do
            grep -q "$component" /tmp/apk-manifest.txt
          done

          if test -s android-native/app/src/main/java/com/amin/pocketgba/VoiceCommandActivity.java; then
            grep -q 'VoiceCommandActivity' /tmp/apk-manifest.txt
            grep -q 'android.permission.RECORD_AUDIO' /tmp/apk-permissions.txt
          fi

          unzip -Z1 "$APK" > /tmp/apk-files.txt
          grep -Fxq 'assets/bootstrap/index.html' /tmp/apk-files.txt
          "$APKSIGNER" verify --verbose "$APK"

          SAFE_VERSION="$(printf '%s' "$VERSION_NAME" | tr -cs 'A-Za-z0-9._-' '-')"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Package CI-only artifact
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          FILE="Amin-Pocket-GBA-${{ steps.inspect.outputs.safe_version }}-CI-${GITHUB_RUN_ID}.apk"
          cp android-native/app/build/outputs/apk/debug/app-debug.apk "dist/$FILE"
          printf '%s\n' \
            'CI DEBUG ARTIFACT ONLY' \
            'This artifact is not approved for the native update manifest or production distribution.' \
            "Version: ${{ steps.inspect.outputs.version_name }} (${{ steps.inspect.outputs.version_code }})" \
            > dist/SIGNING_STATUS.txt
          cd dist
          sha256sum "$FILE" > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Upload CI APK
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-${{ steps.inspect.outputs.safe_version }}-CI-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
