name: Build Amin Pocket GBA Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/**'
      - 'tests/*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/**'
      - 'tests/*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-update-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      AMIN_KEYSTORE_BASE64: ${{ secrets.AMIN_KEYSTORE_BASE64 }}
      AMIN_KEYSTORE_PASSWORD: ${{ secrets.AMIN_KEYSTORE_PASSWORD }}
      AMIN_KEY_ALIAS: ${{ secrets.AMIN_KEY_ALIAS }}
      AMIN_KEY_PASSWORD: ${{ secrets.AMIN_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Prepare permanent signing when configured
        id: signing
        run: |
          set -euo pipefail
          if [[ -n "${AMIN_KEYSTORE_BASE64:-}" \
             && -n "${AMIN_KEYSTORE_PASSWORD:-}" \
             && -n "${AMIN_KEY_ALIAS:-}" \
             && -n "${AMIN_KEY_PASSWORD:-}" ]]; then
            KEYSTORE_PATH="$RUNNER_TEMP/amin-pocket-gba.jks"
            printf '%s' "$AMIN_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            test -s "$KEYSTORE_PATH"
            echo "AMIN_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle official EmulatorJS 4.2.3 and mGBA core
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs-v4.2.3.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs-v4.2.3"
          MIN_ZIP="$RUNNER_TEMP/emulator.min.zip"
          TARGET='android-native/app/src/main/assets/emulator'

          curl --fail --location --retry 4 --retry-delay 2 \
            'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' \
            --output "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"

          curl --fail --location --retry 4 --retry-delay 2 \
            'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' \
            --output "$MIN_ZIP"
          unzip -o "$MIN_ZIP" -d "$TARGET"

          curl --fail --location --retry 4 --retry-delay 2 \
            'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' \
            --output "$TARGET/cores/mgba-wasm.data"

          test -s "$TARGET/loader.js"
          test -s "$TARGET/emulator.min.js"
          test -s "$TARGET/emulator.min.css"
          test -s "$TARGET/cores/mgba-wasm.data"
          stat -c '%n %s bytes' \
            "$TARGET/emulator.min.js" \
            "$TARGET/emulator.min.css" \
            "$TARGET/cores/mgba-wasm.data"
          du -sh "$TARGET"

      - name: Validate source files
        run: |
          set -euxo pipefail
          node --check amin-vault/gba.js
          node --check amin-vault/gba-native-vault-v2.js
          node --check amin-vault/gba-reliability.js
          node --check amin-vault/gba-reliability-ui.js
          node --check amin-vault/amin-error-reporter.js
          node --check amin-vault/runtime-updater.js
          node --check amin-vault/sw.js
          python3 -m json.tool amin-vault/runtime-manifest.json >/dev/null
          python3 -m json.tool amin-vault/native-release-manifest.json >/dev/null
          grep -q 'class LaunchGateActivity' android-native/app/src/main/java/com/amin/pocketgba/LaunchGateActivity.java
          grep -q 'class NativeSaveVaultBridge' android-native/app/src/main/java/com/amin/pocketgba/NativeSaveVaultBridge.java
          grep -q 'class NativeCartridgeVaultBridge' android-native/app/src/main/java/com/amin/pocketgba/NativeCartridgeVaultBridge.java
          grep -q 'class NativeLocalContentRouter' android-native/app/src/main/java/com/amin/pocketgba/NativeLocalContentRouter.java
          grep -q 'class NativeContentWebViewClient' android-native/app/src/main/java/com/amin/pocketgba/NativeContentWebViewClient.java
          grep -q 'class NativeDiagnosticsBridge' android-native/app/src/main/java/com/amin/pocketgba/NativeDiagnosticsBridge.java
          grep -q 'AminNativeCartridgeVault' android-native/app/src/main/java/com/amin/pocketgba/LifecycleSafeWebView.java
          grep -q 'android:name=".LaunchGateActivity"' android-native/app/src/main/AndroidManifest.xml
          grep -q 'android:scheme="amin-home" android:host="open"' android-native/app/src/main/AndroidManifest.xml
          grep -q 'android:launchMode="singleTask"' android-native/app/src/main/AndroidManifest.xml

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Prepare Bridge 10 label
        run: |
          set -euxo pipefail
          sed -i 's/Amin Pocket GBA Bridge 0.9.2 B3/Amin Pocket GBA Bridge 0.9.2 B10/g' android-native/app/build.gradle

      - name: Build and lint Bridge 10
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            -PAMIN_VERSION_CODE=106 \
            -PAMIN_PREVIEW_SUFFIX=-bridge10 \
            :app:assembleDebug \
            :app:lintDebug

      - name: Inspect Bridge 10 APK
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          "$AAPT" dump badging "$APK" | tee /tmp/apk-badging.txt
          grep -q "package: name='com.amin.pocketgba' versionCode='106' versionName='0.9.2-bridge10'" /tmp/apk-badging.txt
          grep -q "application-label:'Amin Pocket GBA Bridge 0.9.2 B10'" /tmp/apk-badging.txt
          "$AAPT" dump permissions "$APK" | tee /tmp/apk-permissions.txt
          grep -q 'android.permission.UPDATE_PACKAGES_WITHOUT_USER_ACTION' /tmp/apk-permissions.txt
          grep -q 'android.permission.POST_NOTIFICATIONS' /tmp/apk-permissions.txt
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee /tmp/apk-manifest.txt
          grep -q 'LaunchGateActivity' /tmp/apk-manifest.txt
          grep -q 'amin-home' /tmp/apk-manifest.txt
          grep -q 'ControlCenterActivity' /tmp/apk-manifest.txt
          unzip -l "$APK" | tee /tmp/apk-files.txt
          grep -q 'assets/emulator/loader.js' /tmp/apk-files.txt
          grep -q 'assets/emulator/emulator.min.js' /tmp/apk-files.txt
          grep -q 'assets/emulator/emulator.min.css' /tmp/apk-files.txt
          grep -q 'assets/emulator/cores/mgba-wasm.data' /tmp/apk-files.txt
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee /tmp/apk-signing.txt
          stat -c 'APK size: %s bytes' "$APK"

      - name: Package Bridge 10 artifact
        id: package
        run: |
          set -euxo pipefail
          mkdir -p dist
          if [[ '${{ steps.signing.outputs.ready }}' == 'true' ]]; then
            FILE='Amin-Pocket-GBA-v0.9.2-bridge10.apk'
            ARTIFACT='Amin-Pocket-GBA-v0.9.2-bridge10'
            STATUS='PERMANENT SIGNING ENABLED: Native Cartridge Vault v2, Android .sav/.bak, and bundled EmulatorJS 4.2.3 mGBA.'
          else
            FILE='Amin-Pocket-GBA-v0.9.2-bridge10-CI-ONLY.apk'
            ARTIFACT='Amin-Pocket-GBA-v0.9.2-bridge10-CI-ONLY-NOT-UPDATABLE'
            STATUS='CI DEBUG SIGNING ONLY.'
          fi
          cp android-native/app/build/outputs/apk/debug/app-debug.apk "dist/$FILE"
          printf '%s\n' "$STATUS" > dist/SIGNING_STATUS.txt
          cp /tmp/apk-signing.txt dist/APK_SIGNING_CERTIFICATE.txt
          cd dist
          sha256sum "$FILE" > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt
          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload Bridge 10 APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Build Play internal testing AAB code 107
        if: steps.signing.outputs.ready == 'true'
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            -PAMIN_VERSION_CODE=107 \
            :app:bundleRelease

      - name: Package Play internal testing bundle
        if: steps.signing.outputs.ready == 'true'
        run: |
          set -euxo pipefail
          BUNDLE='android-native/app/build/outputs/bundle/release/app-release.aab'
          test -s "$BUNDLE"
          jarsigner -verify -verbose -certs "$BUNDLE" | tee /tmp/aab-signing.txt
          mkdir -p dist-play
          cp "$BUNDLE" dist-play/Amin-Pocket-GBA-v0.9.2-code107-internal.aab
          keytool -exportcert -rfc \
            -keystore "$AMIN_KEYSTORE_PATH" \
            -storepass "$AMIN_KEYSTORE_PASSWORD" \
            -alias "$AMIN_KEY_ALIAS" \
            -file dist-play/amin-app-signing-certificate.pem
          keytool -list -v \
            -keystore "$AMIN_KEYSTORE_PATH" \
            -storepass "$AMIN_KEYSTORE_PASSWORD" \
            -alias "$AMIN_KEY_ALIAS" > dist-play/amin-signing-fingerprints.txt
          cp /tmp/aab-signing.txt dist-play/AAB_SIGNING_REPORT.txt
          cd dist-play
          sha256sum Amin-Pocket-GBA-v0.9.2-code107-internal.aab > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Upload Play internal testing package
        if: steps.signing.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-Play-Internal-code107
          path: dist-play/
          if-no-files-found: error
          retention-days: 30
