name: Build Amin Pocket GBA Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/sw.js'
      - '.github/workflows/build-amin-pocket-gba-android.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/sw.js'
      - '.github/workflows/build-amin-pocket-gba-android.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Validate downloadable runtime
        shell: bash
        run: |
          node --check amin-vault/runtime-updater.js
          node --check amin-vault/sw.js
          python3 -m json.tool amin-vault/runtime-manifest.json >/dev/null
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('amin-vault')
          manifest = json.loads((root / 'runtime-manifest.json').read_text(encoding='utf-8'))
          missing = []
          for asset in manifest['assets']:
              relative = asset.removeprefix('./')
              target = root if relative == '' else root / relative
              if not target.exists():
                  missing.append(asset)
          if missing:
              raise SystemExit('Missing runtime assets: ' + ', '.join(missing))
          print(f"Validated {len(manifest['assets'])} runtime assets")
          PY

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Assemble debug APK
        run: gradle --no-daemon --stacktrace -p android-native :app:assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp android-native/app/build/outputs/apk/debug/app-debug.apk dist/Amin-Pocket-GBA-v0.9.0-debug.apk
          cd dist
          sha256sum Amin-Pocket-GBA-v0.9.0-debug.apk > SHA256SUMS.txt

      - name: Verify artifact checksum
        run: |
          cd dist
          sha256sum -c SHA256SUMS.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.0-debug
          path: dist/
          if-no-files-found: error
          retention-days: 30
