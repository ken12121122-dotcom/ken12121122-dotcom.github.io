name: Build Amin Pocket GBA Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-*.js'
      - 'amin-vault/native-release-manifest.json'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/sw.js'
      - 'tests/runtime-*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'
      - '.github/workflows/release-amin-pocket-gba-android.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-*.js'
      - 'amin-vault/native-release-manifest.json'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/sw.js'
      - 'tests/runtime-*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'
      - '.github/workflows/release-amin-pocket-gba-android.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Validate downloadable runtime
        shell: bash
        run: |
          node --check amin-vault/amin-native-shell.js
          node --check amin-vault/amin-backup-v2.js
          node --check amin-vault/amin-diagnostics.js
          node --check amin-vault/runtime-updater.js
          node --check amin-vault/sw.js
          python3 -m json.tool amin-vault/runtime-manifest.json >/dev/null
          python3 -m json.tool amin-vault/native-release-manifest.json >/dev/null
          test -f android-native/app/src/main/assets/bootstrap/index.html
          test -f android-native/app/src/main/res/xml/file_paths.xml
          test -f android-native/app/src/main/java/com/amin/pocketgba/NativeUpdateActivity.java
          test -f android-native/app/src/main/java/com/amin/pocketgba/PermissionCenterActivity.java
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('amin-vault')
          manifest = json.loads((root / 'runtime-manifest.json').read_text(encoding='utf-8'))
          if manifest['runtimeVersion'] != '0.9.2-rc2':
              raise SystemExit('Unexpected runtime version')
          for capability in ['backup-v2', 'native-update-center', 'permission-center']:
              if capability not in manifest.get('optionalCapabilities', []):
                  raise SystemExit(f'{capability} capability is missing')

          missing = []
          for asset in manifest['assets']:
              relative = asset.removeprefix('./')
              target = root if relative == '' else root / relative
              if not target.exists():
                  missing.append(asset)
          if missing:
              raise SystemExit('Missing runtime assets: ' + ', '.join(missing))

          html = (root / 'gba.html').read_text(encoding='utf-8')
          required_ids = [
              'exportBackupButton', 'importBackupButton', 'backupImportInput',
              'backupIncludeRoms', 'backupStatus', 'diagnosticSummary',
              'refreshDiagnosticsButton', 'exportDiagnosticsButton',
              'nativeUpdateLink', 'nativePermissionsLink'
          ]
          missing_ids = [item for item in required_ids if f'id="{item}"' not in html]
          if missing_ids:
              raise SystemExit('Missing GBA tool controls: ' + ', '.join(missing_ids))
          if 'amin-permissions://open' not in html:
              raise SystemExit('Permission center deep link is missing')
          if 'amin-backup-v2.js' not in html:
              raise SystemExit('Hardened backup v2 is not loaded')
          if 'amin-backup.js' in html:
              raise SystemExit('Legacy backup script is still loaded')

          backup = (root / 'amin-backup-v2.js').read_text(encoding='utf-8')
          for required in [
              "const FORMAT_VERSION = 2", 'indexedDB.databases',
              'indexedDB.deleteDatabase', 'LOCAL_STORAGE_PREFIXES',
              'AMIN_GBA_SAVE_GUARD'
          ]:
              if required not in backup:
                  raise SystemExit(f'Backup hardening marker missing: {required}')

          native_manifest = json.loads((root / 'native-release-manifest.json').read_text(encoding='utf-8'))
          if native_manifest['enabled'] is not False:
              raise SystemExit('Unsigned native release channel must remain disabled')
          if native_manifest['packageId'] != 'com.amin.pocketgba':
              raise SystemExit('Unexpected native package ID')
          if native_manifest['apkUrl'] is not None or native_manifest['apkSha256'] is not None:
              raise SystemExit('Disabled native release channel must not expose an APK')

          permission_source = Path('android-native/app/src/main/java/com/amin/pocketgba/PermissionCenterActivity.java').read_text(encoding='utf-8')
          for marker in [
              'POST_NOTIFICATIONS', 'canRequestPackageInstalls',
              'ACTION_APPLICATION_DETAILS_SETTINGS',
              'ACTION_IGNORE_BATTERY_OPTIMIZATION_SETTINGS',
              'MANAGE_EXTERNAL_STORAGE'
          ]:
              if marker not in permission_source:
                  raise SystemExit(f'Permission center marker missing: {marker}')

          print(f"Validated {len(manifest['assets'])} runtime assets and {len(required_ids)} tool controls")
          PY
          node --test tests/runtime-service-worker.test.mjs

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compile preview APK
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-diagnostics
          gradle --no-daemon --console=plain --stacktrace -p android-native :app:assembleDebug 2>&1 | tee ci-diagnostics/compile.log

      - name: Upload compile diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-compile-diagnostics
          path: ci-diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop after compile failure
        if: ${{ steps.compile.outcome == 'failure' }}
        run: exit 1

      - name: Run Android lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-lint
          gradle --no-daemon --console=plain --stacktrace -p android-native :app:lintDebug 2>&1 | tee ci-lint/lint-console.log
          find android-native/app/build/reports -type f -maxdepth 3 -print -exec cp {} ci-lint/ \; 2>/dev/null || true

      - name: Upload lint diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-lint-diagnostics
          path: ci-lint/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop after lint failure
        if: ${{ steps.lint.outcome == 'failure' }}
        run: exit 1

      - name: Validate preview APK manifest and assets
        shell: bash
        run: |
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          "$AAPT" dump badging "$APK" | tee /tmp/apk-badging.txt
          grep -q "package: name='com.amin.pocketgba.preview092' versionCode='92' versionName='0.9.2-preview'" /tmp/apk-badging.txt
          grep -q "application-label:'Amin Pocket GBA Preview 0.9.2'" /tmp/apk-badging.txt
          "$AAPT" dump permissions "$APK" | tee /tmp/apk-permissions.txt
          grep -q 'android.permission.ACCESS_NETWORK_STATE' /tmp/apk-permissions.txt
          grep -q 'android.permission.VIBRATE' /tmp/apk-permissions.txt
          grep -q 'android.permission.POST_NOTIFICATIONS' /tmp/apk-permissions.txt
          grep -q 'android.permission.REQUEST_INSTALL_PACKAGES' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.MANAGE_EXTERNAL_STORAGE' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.RECORD_AUDIO' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.CAMERA' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.ACCESS_FINE_LOCATION' /tmp/apk-permissions.txt
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee /tmp/apk-manifest-tree.txt
          grep -q 'NativeUpdateActivity' /tmp/apk-manifest-tree.txt
          grep -q 'PermissionCenterActivity' /tmp/apk-manifest-tree.txt
          grep -q 'amin-update' /tmp/apk-manifest-tree.txt
          grep -q 'amin-permissions' /tmp/apk-manifest-tree.txt
          grep -q 'androidx.core.content.FileProvider' /tmp/apk-manifest-tree.txt
          unzip -l "$APK" | grep -q 'assets/bootstrap/index.html'

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp android-native/app/build/outputs/apk/debug/app-debug.apk dist/Amin-Pocket-GBA-v0.9.2-preview.apk
          cd dist
          sha256sum Amin-Pocket-GBA-v0.9.2-preview.apk > SHA256SUMS.txt

      - name: Verify artifact checksum
        run: |
          cd dist
          sha256sum -c SHA256SUMS.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-preview
          path: dist/
          if-no-files-found: error
          retention-days: 30
