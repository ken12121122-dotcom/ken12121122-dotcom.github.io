name: Build Amin Pocket GBA Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-*.js'
      - 'amin-vault/native-release-manifest.json'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/sw.js'
      - 'tests/runtime-*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'
      - '.github/workflows/release-amin-pocket-gba-android.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-*.js'
      - 'amin-vault/native-release-manifest.json'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/sw.js'
      - 'tests/runtime-*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'
      - '.github/workflows/release-amin-pocket-gba-android.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Validate runtime, routes, and orientation contract
        shell: bash
        run: |
          set -euxo pipefail
          node --check amin-vault/amin-native-shell.js
          node --check amin-vault/amin-backup-v2.js
          node --check amin-vault/amin-diagnostics.js
          node --check amin-vault/runtime-updater.js
          node --check amin-vault/sw.js
          python3 -m json.tool amin-vault/runtime-manifest.json >/dev/null
          python3 -m json.tool amin-vault/native-release-manifest.json >/dev/null
          test -f android-native/app/src/main/assets/bootstrap/index.html
          test -f android-native/app/src/main/res/xml/file_paths.xml
          test -f android-native/app/src/main/java/com/amin/pocketgba/ControlCenterActivity.java
          test -f android-native/app/src/main/java/com/amin/pocketgba/PermissionCenterActivity.java
          test -f android-native/app/src/main/java/com/amin/pocketgba/UpdateHubActivity.java
          test -f android-native/app/src/main/java/com/amin/pocketgba/NativeUpdateActivity.java
          python3 - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = Path('amin-vault')
          runtime = json.loads((root / 'runtime-manifest.json').read_text(encoding='utf-8'))
          if runtime['runtimeVersion'] != '0.9.2-rc2':
              raise SystemExit('Unexpected runtime version')
          for capability in ['backup-v2', 'native-update-center', 'permission-center']:
              if capability not in runtime.get('optionalCapabilities', []):
                  raise SystemExit(f'{capability} capability is missing')

          missing = []
          for asset in runtime['assets']:
              relative = asset.removeprefix('./')
              target = root if relative == '' else root / relative
              if not target.exists():
                  missing.append(asset)
          if missing:
              raise SystemExit('Missing runtime assets: ' + ', '.join(missing))

          control = Path('android-native/app/src/main/java/com/amin/pocketgba/ControlCenterActivity.java').read_text(encoding='utf-8')
          for marker in [
              '遊戲控制台', '開啟 GBA 遊戲庫', '重新檢查',
              'PermissionCenterActivity.class', 'UpdateHubActivity.class',
              '顯示系統詳細資訊', 'PREVIEW_RUNTIME_MANIFEST_URL'
          ]:
              if marker not in control:
                  raise SystemExit(f'Dashboard marker missing: {marker}')

          permission = Path('android-native/app/src/main/java/com/amin/pocketgba/PermissionCenterActivity.java').read_text(encoding='utf-8')
          for marker in ['依序處理建議設定', '開啟通知', '允許安裝更新', '顯示安全設計說明']:
              if marker not in permission:
                  raise SystemExit(f'Permission action missing: {marker}')
          if 'android.widget.Switch' in permission:
              raise SystemExit('Misleading permission Switch UI remains')

          update_hub = Path('android-native/app/src/main/java/com/amin/pocketgba/UpdateHubActivity.java').read_text(encoding='utf-8')
          for marker in ['版本與更新', '目前安裝版本', '重新檢查', '進入安全更新流程']:
              if marker not in update_hub:
                  raise SystemExit(f'Update Hub marker missing: {marker}')

          android_ns = '{http://schemas.android.com/apk/res/android}'
          manifest_path = Path('android-native/app/src/main/AndroidManifest.xml')
          tree = ET.parse(manifest_path)
          application = tree.getroot().find('application')
          activities = {
              item.attrib[android_ns + 'name']: item
              for item in application.findall('activity')
          }
          expected_orientation = {
              '.ControlCenterActivity': 'portrait',
              '.PermissionCenterActivity': 'portrait',
              '.UpdateHubActivity': 'portrait',
              '.NativeUpdateActivity': 'portrait',
              '.MainActivity': 'sensorLandscape',
          }
          for name, expected in expected_orientation.items():
              actual = activities[name].attrib.get(android_ns + 'screenOrientation')
              if actual != expected:
                  raise SystemExit(f'{name} orientation {actual!r}, expected {expected!r}')

          deep_link_owner = None
          for name, activity in activities.items():
              for intent_filter in activity.findall('intent-filter'):
                  for data in intent_filter.findall('data'):
                      if (data.attrib.get(android_ns + 'scheme') == 'amin-update'
                              and data.attrib.get(android_ns + 'host') == 'check'):
                          deep_link_owner = name
          if deep_link_owner != '.UpdateHubActivity':
              raise SystemExit(f'amin-update deep link owned by {deep_link_owner!r}')

          release = json.loads((root / 'native-release-manifest.json').read_text(encoding='utf-8'))
          if release['enabled'] is not False:
              raise SystemExit('Unsigned native release channel must remain disabled')
          if release['packageId'] != 'com.amin.pocketgba':
              raise SystemExit('Unexpected native package ID')
          if release['apkUrl'] is not None or release['apkSha256'] is not None:
              raise SystemExit('Disabled native release channel must not expose an APK')

          print(f"Validated {len(runtime['assets'])} runtime assets and portrait-to-landscape contract")
          PY
          node --test tests/runtime-service-worker.test.mjs

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compile Preview 3 APK
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-diagnostics
          gradle --no-daemon --console=plain --stacktrace -p android-native :app:assembleDebug 2>&1 | tee ci-diagnostics/compile.log

      - name: Upload compile diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-preview3-compile-diagnostics
          path: ci-diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop after compile failure
        if: ${{ steps.compile.outcome == 'failure' }}
        run: exit 1

      - name: Run Android lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-lint
          gradle --no-daemon --console=plain --stacktrace -p android-native :app:lintDebug 2>&1 | tee ci-lint/lint-console.log
          find android-native/app/build/reports -maxdepth 3 -type f -print -exec cp {} ci-lint/ \; 2>/dev/null || true

      - name: Upload lint diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-preview3-lint-diagnostics
          path: ci-lint/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop after lint failure
        if: ${{ steps.lint.outcome == 'failure' }}
        run: exit 1

      - name: Validate Preview 3 APK manifest and assets
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          "$AAPT" dump badging "$APK" | tee /tmp/apk-badging.txt
          grep -q "package: name='com.amin.pocketgba.preview092' versionCode='94' versionName='0.9.2-preview3'" /tmp/apk-badging.txt
          grep -q "application-label:'Amin Pocket GBA Preview 0.9.2 P3'" /tmp/apk-badging.txt
          "$AAPT" dump permissions "$APK" | tee /tmp/apk-permissions.txt
          grep -q 'android.permission.ACCESS_NETWORK_STATE' /tmp/apk-permissions.txt
          grep -q 'android.permission.VIBRATE' /tmp/apk-permissions.txt
          grep -q 'android.permission.POST_NOTIFICATIONS' /tmp/apk-permissions.txt
          grep -q 'android.permission.REQUEST_INSTALL_PACKAGES' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.MANAGE_EXTERNAL_STORAGE' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.RECORD_AUDIO' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.CAMERA' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.ACCESS_FINE_LOCATION' /tmp/apk-permissions.txt
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee /tmp/apk-manifest-tree.txt
          grep -q 'ControlCenterActivity' /tmp/apk-manifest-tree.txt
          grep -q 'PermissionCenterActivity' /tmp/apk-manifest-tree.txt
          grep -q 'UpdateHubActivity' /tmp/apk-manifest-tree.txt
          grep -q 'NativeUpdateActivity' /tmp/apk-manifest-tree.txt
          grep -q 'android.intent.action.MAIN' /tmp/apk-manifest-tree.txt
          grep -q 'android.intent.category.LAUNCHER' /tmp/apk-manifest-tree.txt
          grep -q 'amin-update' /tmp/apk-manifest-tree.txt
          grep -q 'amin-permissions' /tmp/apk-manifest-tree.txt
          grep -q 'androidx.core.content.FileProvider' /tmp/apk-manifest-tree.txt
          unzip -l "$APK" | grep -q 'assets/bootstrap/index.html'

      - name: Prepare Preview 3 artifact
        run: |
          mkdir -p dist
          cp android-native/app/build/outputs/apk/debug/app-debug.apk dist/Amin-Pocket-GBA-v0.9.2-preview3.apk
          cd dist
          sha256sum Amin-Pocket-GBA-v0.9.2-preview3.apk > SHA256SUMS.txt

      - name: Verify artifact checksum
        run: |
          cd dist
          sha256sum -c SHA256SUMS.txt

      - name: Upload Preview 3 APK
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-preview3
          path: dist/
          if-no-files-found: error
          retention-days: 30
