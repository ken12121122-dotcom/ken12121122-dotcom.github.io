name: Build Amin Pocket GBA Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.css'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-*.js'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/sw.js'
      - 'tests/*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.css'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-*.js'
      - 'amin-vault/runtime-*.js'
      - 'amin-vault/runtime-*.json'
      - 'amin-vault/sw.js'
      - 'tests/*.mjs'
      - '.github/workflows/build-amin-pocket-gba-android.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Validate RC4 syntax and static contract
        shell: bash
        run: |
          set -euxo pipefail
          node --check amin-vault/gba.js
          node --check amin-vault/gba-save-guard.js
          node --check amin-vault/gba-save-migration.js
          node --check amin-vault/amin-backup-v2.js
          node --check amin-vault/amin-diagnostics.js
          node --check amin-vault/runtime-updater.js
          node --check amin-vault/sw.js
          python3 -m json.tool amin-vault/runtime-manifest.json >/dev/null
          python3 -m json.tool amin-vault/native-release-manifest.json >/dev/null

          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('amin-vault')
          manifest = json.loads((root / 'runtime-manifest.json').read_text(encoding='utf-8'))
          assert manifest['runtimeVersion'] == '0.9.2-rc4'
          for capability in (
              'save-vault-v1',
              'native-save-vault-v1',
              'legacy-save-migration-v1',
          ):
              assert capability in manifest['optionalCapabilities'], capability
          for asset in manifest['assets']:
              relative = asset.removeprefix('./')
              target = root if relative == '' else root / relative
              assert target.exists(), asset

          gradle = Path('android-native/app/build.gradle').read_text(encoding='utf-8')
          assert 'AMIN_VERSION_CODE' in gradle
          assert 'versionCode aminVersionCode' in gradle
          assert "applicationIdSuffix '.preview094'" in gradle
          assert 'f0bc618c36e8ae9c09a1987b9cc65fd821cdb455' in gradle

          application = Path('android-native/app/src/main/java/com/amin/pocketgba/AminPocketApplication.java').read_text(encoding='utf-8')
          bridge = Path('android-native/app/src/main/java/com/amin/pocketgba/NativeSaveBridge.java').read_text(encoding='utf-8')
          assert 'AminNativeSaveVault' in application
          assert 'addJavascriptInterface' in application
          for marker in ('getFD().sync()', 'current.renameTo(backup)', 'unchanged', 'sha256'):
              assert marker in bridge, marker

          backup = Path('android-native/app/src/main/res/xml/backup_rules.xml').read_text(encoding='utf-8')
          extraction = Path('android-native/app/src/main/res/xml/data_extraction_rules.xml').read_text(encoding='utf-8')
          assert 'path="gba-saves/"' in backup
          assert extraction.count('path="gba-saves/"') == 2
          PY

      - name: Test Runtime atomic updates
        run: node --test tests/runtime-service-worker.test.mjs

      - name: Test ROM save identity
        run: node --test --test-name-pattern='ROM identity' tests/gba-save-contract.test.mjs

      - name: Test save flush synchronization
        run: node --test --test-name-pattern='save exit' tests/gba-save-contract.test.mjs

      - name: Test legacy save contract
        run: node --test --test-name-pattern='legacy name-based' tests/gba-save-contract.test.mjs

      - name: Test native save vault contract
        run: node --test --test-name-pattern='native vault' tests/gba-save-contract.test.mjs

      - name: Test Android save backup contract
        run: node --test --test-name-pattern='Android backup' tests/gba-save-contract.test.mjs

      - name: Test Preview migration UI
        run: node --test --test-name-pattern='Preview migration UI' tests/gba-save-contract.test.mjs

      - name: Test RC4 save manifest
        run: node --test --test-name-pattern='RC4 manifest' tests/gba-save-contract.test.mjs

      - name: Test Preview side-by-side package
        run: node --test --test-name-pattern='package installs beside' tests/gba-save-contract.test.mjs

      - name: Test Preview runtime pin
        run: node --test --test-name-pattern='pinned to the final' tests/gba-save-contract.test.mjs

      - name: Test legacy save migration behavior
        run: node --test tests/gba-save-migration.test.mjs

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build and lint Preview 4
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            :app:assembleDebug \
            :app:lintDebug

      - name: Inspect Preview 4 APK
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          "$AAPT" dump badging "$APK" | tee /tmp/apk-badging.txt
          grep -q "package: name='com.amin.pocketgba.preview094' versionCode='95' versionName='0.9.2-preview4'" /tmp/apk-badging.txt
          grep -q "application-label:'Amin Pocket GBA Preview 0.9.2 P4'" /tmp/apk-badging.txt
          "$AAPT" dump permissions "$APK" | tee /tmp/apk-permissions.txt
          grep -q 'android.permission.INTERNET' /tmp/apk-permissions.txt
          grep -q 'android.permission.REQUEST_INSTALL_PACKAGES' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.MANAGE_EXTERNAL_STORAGE' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.CAMERA' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.RECORD_AUDIO' /tmp/apk-permissions.txt
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee /tmp/apk-manifest.txt
          grep -q 'AminPocketApplication' /tmp/apk-manifest.txt
          grep -q 'ControlCenterActivity' /tmp/apk-manifest.txt
          grep -q 'MainActivity' /tmp/apk-manifest.txt
          unzip -l "$APK" | grep -q 'assets/bootstrap/index.html'

      - name: Package and verify Preview 4
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp android-native/app/build/outputs/apk/debug/app-debug.apk \
            dist/Amin-Pocket-GBA-v0.9.2-preview4.apk
          cd dist
          sha256sum Amin-Pocket-GBA-v0.9.2-preview4.apk > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Upload Preview 4 APK
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-preview4
          path: dist/
          if-no-files-found: error
          retention-days: 30
