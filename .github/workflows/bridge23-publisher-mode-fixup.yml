name: Configure Bridge 23 tracked publisher

on:
  pull_request:
    branches:
      - ci/amin-control-api-v1-validation-base
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  configure-publisher:
    if: github.head_ref == 'release/bridge23-amin-control-api-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Bridge 23 release branch
        uses: actions/checkout@v6
        with:
          ref: release/bridge23-amin-control-api-v1
          fetch-depth: 0

      - name: Switch publisher to tracked formal PR mode
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('.github/workflows/publish-amin-pocket-gba-bridge23.yml')
          text = path.read_text(encoding='utf-8')
          text, count = re.subn(
              r"on:\n  push:\n    branches:\n      - release/bridge23-amin-control-api-v1\n    paths:\n(?:      - .*\n)+  workflow_dispatch:\n",
              "on:\n  pull_request:\n    branches:\n      - release/bridge22-independent-floating-toggles\n    types: [opened, synchronize, reopened]\n  workflow_dispatch:\n",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'Publisher trigger replacements: {count}')
          text = text.replace('  cancel-in-progress: false\n', '  cancel-in-progress: true\n', 1)
          old = "          test \"$GITHUB_REF_NAME\" = 'release/bridge23-amin-control-api-v1'\n"
          new = (
              "          if [ \"$GITHUB_EVENT_NAME\" = 'pull_request' ]; then\n"
              "            test \"$GITHUB_HEAD_REF\" = 'release/bridge23-amin-control-api-v1'\n"
              "          else\n"
              "            test \"$GITHUB_REF_NAME\" = 'release/bridge23-amin-control-api-v1'\n"
              "          fi\n"
          )
          if text.count(old) != 1:
              raise SystemExit('Publisher branch identity line not found exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          grep -Fq 'pull_request:' .github/workflows/publish-amin-pocket-gba-bridge23.yml
          grep -Fq 'cancel-in-progress: true' .github/workflows/publish-amin-pocket-gba-bridge23.yml
          grep -Fq 'GITHUB_HEAD_REF' .github/workflows/publish-amin-pocket-gba-bridge23.yml

      - name: Commit publisher mode
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/publish-amin-pocket-gba-bridge23.yml
          git commit -m 'ci: run Bridge 23 publisher on tracked formal PR'
          git push origin HEAD:release/bridge23-amin-control-api-v1
