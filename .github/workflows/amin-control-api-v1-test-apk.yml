name: Build Amin Control API v1 Test APK

on:
  push:
    branches:
      - feature/amin-control-api-v1
  pull_request:
    branches:
      - release/bridge22-independent-floating-toggles
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: amin-control-api-v1-test-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-side-by-side-test-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Protect formal release files
        shell: bash
        run: |
          set -euxo pipefail
          grep -Fq "def aminVersionCode = (providers.gradleProperty('AMIN_VERSION_CODE').orNull ?: '118').toInteger()" android-native/app/build.gradle
          grep -Fq "def aminBridgeSuffix = providers.gradleProperty('AMIN_BRIDGE_SUFFIX').orNull ?: '-bridge22'" android-native/app/build.gradle
          grep -Fq "applicationId 'com.amin.pocketgba'" android-native/app/build.gradle
          ! grep -Fq 'applicationIdSuffix' android-native/app/build.gradle
          git diff --exit-code origin/release/bridge22-independent-floating-toggles -- amin-vault/native-release-manifest.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Bundle EmulatorJS and mGBA
        shell: bash
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs-v4.2.3.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs-v4.2.3"
          MIN_ZIP="$RUNNER_TEMP/emulator.min.zip"
          TARGET='android-native/app/src/main/assets/emulator'
          curl --fail --location --retry 4 --retry-delay 2 'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' --output "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' --output "$MIN_ZIP"
          unzip -o "$MIN_ZIP" -d "$TARGET"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' --output "$TARGET/cores/mgba-wasm.data"

      - name: Inject temporary side-by-side identity
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('android-native/app/build.gradle')
          text = path.read_text(encoding='utf-8')
          needle = """        debug {
              manifestPlaceholders = [appLabel: 'Amin Pocket GBA Debug']"""
          replacement = """        debug {
              applicationIdSuffix '.api1test'
              versionNameSuffix '-api1test'
              manifestPlaceholders = [appLabel: 'Amin Control API v1 Test']"""
          if text.count(needle) != 1:
              raise SystemExit('Debug build block contract not found exactly once')
          path.write_text(text.replace(needle, replacement), encoding='utf-8')
          PY
          grep -Fq "applicationIdSuffix '.api1test'" android-native/app/build.gradle
          git diff -- android-native/app/build.gradle

      - name: Build and lint side-by-side test variant
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            :app:testDebugUnitTest \
            :app:assembleDebug \
            :app:lintDebug

      - name: Inspect and package test APK
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          test -s "$APK"
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          "$AAPT" dump badging "$APK" | tee "$RUNNER_TEMP/api-test-badging.txt"
          grep -Fq "package: name='com.amin.pocketgba.api1test' versionCode='118'" "$RUNNER_TEMP/api-test-badging.txt"
          grep -Fq "application-label:'Amin Control API v1 Test'" "$RUNNER_TEMP/api-test-badging.txt"
          mkdir -p "$RUNNER_TEMP/api-test-artifact"
          cp "$APK" "$RUNNER_TEMP/api-test-artifact/Amin-Control-API-v1-Test.apk"
          (cd "$RUNNER_TEMP/api-test-artifact" && sha256sum Amin-Control-API-v1-Test.apk > SHA256SUMS.txt)
          cat > "$RUNNER_TEMP/api-test-artifact/TEST_BUILD_NOTICE.txt" <<'NOTICE'
          SIDE-BY-SIDE TEST BUILD
          Package: com.amin.pocketgba.api1test
          This APK installs beside the formal com.amin.pocketgba app and does not replace its data or signing identity.
          Formal release version remains 0.9.2-bridge22 (118).
          NOTICE

      - name: Upload side-by-side test APK
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Control-API-v1-Side-by-Side-Test
          path: ${{ runner.temp }}/api-test-artifact/*
          if-no-files-found: error
          retention-days: 14
