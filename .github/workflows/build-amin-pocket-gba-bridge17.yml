name: Build Amin Pocket GBA Bridge 17

on:
  workflow_dispatch:
  push:
    branches:
      - ai/voice-command-v1
    paths:
      - 'android-native/**'
      - '.github/workflows/build-amin-pocket-gba-bridge17.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-bridge17-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      AMIN_KEYSTORE_BASE64: ${{ secrets.AMIN_KEYSTORE_BASE64 }}
      AMIN_KEYSTORE_PASSWORD: ${{ secrets.AMIN_KEYSTORE_PASSWORD }}
      AMIN_KEY_ALIAS: ${{ secrets.AMIN_KEY_ALIAS }}
      AMIN_KEY_PASSWORD: ${{ secrets.AMIN_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Prepare permanent signing
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AMIN_KEYSTORE_BASE64:-}"
          test -n "${AMIN_KEYSTORE_PASSWORD:-}"
          test -n "${AMIN_KEY_ALIAS:-}"
          test -n "${AMIN_KEY_PASSWORD:-}"
          KEYSTORE_PATH="$RUNNER_TEMP/amin-pocket-gba.jks"
          printf '%s' "$AMIN_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"
          echo "AMIN_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Bundle EmulatorJS and mGBA
        shell: bash
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs-v4.2.3.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs-v4.2.3"
          MIN_ZIP="$RUNNER_TEMP/emulator.min.zip"
          TARGET='android-native/app/src/main/assets/emulator'
          curl --fail --location --retry 4 --retry-delay 2 'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' --output "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' --output "$MIN_ZIP"
          unzip -o "$MIN_ZIP" -d "$TARGET"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' --output "$TARGET/cores/mgba-wasm.data"
          test -s "$TARGET/loader.js"
          test -s "$TARGET/emulator.min.js"
          test -s "$TARGET/emulator.min.css"
          test -s "$TARGET/cores/mgba-wasm.data"

      - name: Validate voice command source
        shell: bash
        run: |
          set -euxo pipefail
          test -s android-native/app/src/main/java/com/amin/pocketgba/VoiceCommandActivity.java
          test -s android-native/app/src/main/java/com/amin/pocketgba/VoiceCommandParser.java
          test -s android-native/app/src/main/java/com/amin/pocketgba/AminAction.java
          grep -q 'android.permission.RECORD_AUDIO' android-native/app/src/main/AndroidManifest.xml
          grep -q 'VoiceCommandActivity' android-native/app/src/main/AndroidManifest.xml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Test, build and lint Bridge 17
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            -PAMIN_VERSION_CODE=113 \
            -PAMIN_BRIDGE_SUFFIX=-bridge17 \
            :app:testBridgeUnitTest \
            :app:assembleBridge \
            :app:lintBridge

      - name: Inspect Bridge 17 APK
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/bridge/app-bridge.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          test -s "$APK"
          "$AAPT" dump badging "$APK" | tee /tmp/apk-badging.txt
          grep -q "package: name='com.amin.pocketgba' versionCode='113' versionName='0.9.2-bridge17'" /tmp/apk-badging.txt
          grep -q "application-label:'Amin Pocket GBA'" /tmp/apk-badging.txt
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee /tmp/apk-manifest.txt
          grep -q 'VoiceCommandActivity' /tmp/apk-manifest.txt
          grep -q 'UniversalControlAccessibilityService' /tmp/apk-manifest.txt
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee /tmp/apk-signing.txt
          grep -qi '3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' /tmp/apk-signing.txt

      - name: Package Bridge 17 artifact
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp android-native/app/build/outputs/apk/bridge/app-bridge.apk dist/Amin-Pocket-GBA-v0.9.2-bridge17.apk
          printf '%s\n' 'PERMANENT SIGNING ENABLED' > dist/SIGNING_STATUS.txt
          cp /tmp/apk-signing.txt dist/APK_SIGNING_CERTIFICATE.txt
          cd dist
          sha256sum Amin-Pocket-GBA-v0.9.2-bridge17.apk > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Upload Bridge 17 APK
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge17
          path: dist/
          if-no-files-found: error
          retention-days: 30
