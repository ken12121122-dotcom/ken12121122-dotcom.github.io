name: Materialize and validate Amin Control API v1

on:
  push:
    branches:
      - feature/amin-control-api-v1
    paths:
      - .github/workflows/amin-control-api-v1-bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: amin-control-api-v1-bootstrap
  cancel-in-progress: false

jobs:
  materialize-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 85
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/amin-control-api-v1
          fetch-depth: 0

      - name: Materialize reviewed source bundle
        shell: bash
        run: |
          set -euxo pipefail
          cat .amin-bootstrap/chunk_* | base64 --decode > "$RUNNER_TEMP/amin-control-api-v1.tar.gz"
          echo 'd17bed494615a879dba1a500836ea69f7a55443e4af007a49a26141a9d38eba2  '"$RUNNER_TEMP/amin-control-api-v1.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/amin-control-api-v1.tar.gz" -C "$GITHUB_WORKSPACE"
          rm -rf .amin-bootstrap .github/workflows/amin-control-api-v1-bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: materialize Amin Control API v1 testable implementation'
          git push origin HEAD:feature/amin-control-api-v1

      - name: Protect formal release identity
        shell: bash
        run: |
          set -euxo pipefail
          grep -Fq "'118'" android-native/app/build.gradle
          grep -Fq "'-bridge22'" android-native/app/build.gradle
          git diff HEAD^ -- amin-vault/native-release-manifest.json | grep -q '^$'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'emulator' 'platforms;android-35' 'build-tools;35.0.0' 'system-images;android-35;google_apis;x86_64'

      - name: Enable KVM
        shell: bash
        run: |
          set -euxo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run JavaScript tests
        run: node --test tests/*.test.mjs

      - name: Bundle EmulatorJS and mGBA
        shell: bash
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs-v4.2.3.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs-v4.2.3"
          MIN_ZIP="$RUNNER_TEMP/emulator.min.zip"
          TARGET='android-native/app/src/main/assets/emulator'
          curl --fail --location --retry 4 --retry-delay 2 'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' --output "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' --output "$MIN_ZIP"
          unzip -o "$MIN_ZIP" -d "$TARGET"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' --output "$TARGET/cores/mgba-wasm.data"

      - name: Unit tests build lint and instrumentation build
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native :app:testDebugUnitTest :app:assembleDebug :app:lintDebug :app:assembleDebugAndroidTest

      - name: Inspect debug APK
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          test -s "$APK"
          "$AAPT" dump badging "$APK" | tee "$RUNNER_TEMP/badging.txt"
          grep -Fq "package: name='com.amin.pocketgba' versionCode='118'" "$RUNNER_TEMP/badging.txt"
          "$AAPT" dump xmltree "$APK" AndroidManifest.xml | tee "$RUNNER_TEMP/manifest-tree.txt"
          grep -Fq 'AminControlApiActivity' "$RUNNER_TEMP/manifest-tree.txt"
          grep -Fq 'AminAutomationReceiver' "$RUNNER_TEMP/manifest-tree.txt"
          grep -Fq 'AminControlApiService' "$RUNNER_TEMP/manifest-tree.txt"

      - name: Boot Android 35 emulator
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd --force --name amin_api35 --package 'system-images;android-35;google_apis;x86_64' --device 'pixel_7'
          nohup env -u RUNNER_TRACKING_ID ANDROID_AVD_HOME="$ANDROID_AVD_HOME" "$ANDROID_HOME/emulator/emulator" -avd amin_api35 -no-window -gpu swiftshader_indirect -accel on -cores 2 -memory 3072 -noaudio -no-boot-anim -no-snapshot -wipe-data > "$RUNNER_TEMP/emulator.log" 2>&1 &
          EMULATOR_PID=$!
          adb start-server
          BOOTED=0
          for attempt in $(seq 1 120); do
            if ! kill -0 "$EMULATOR_PID" 2>/dev/null; then cat "$RUNNER_TEMP/emulator.log"; exit 1; fi
            if [ "$(adb get-state 2>/dev/null || true)" = device ] && [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = 1 ]; then BOOTED=1; break; fi
            sleep 5
          done
          test "$BOOTED" -eq 1
          adb shell getprop ro.build.version.sdk | grep -Fx '35'
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Install and smoke test routes
        shell: bash
        run: |
          set -euxo pipefail
          APP_APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          TEST_APK='android-native/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk'
          adb install -r "$APP_APK"
          adb install -r "$TEST_APK"
          adb shell am start -W -a android.intent.action.VIEW -d 'amin-api://settings' -p com.amin.pocketgba | grep -F 'Status: ok'
          adb shell input keyevent 4
          adb shell am start -W -a android.intent.action.VIEW -d 'amin-control://execute?action=SYSTEM_HOME' -p com.amin.pocketgba | grep -F 'Status: ok'
          adb shell input keyevent 4
          adb shell am broadcast -a com.amin.pocketgba.ACTION_EXECUTE -n com.amin.pocketgba/.AminAutomationReceiver --es amin_action SYSTEM_HOME | tee "$RUNNER_TEMP/broadcast.txt"
          grep -F 'Broadcast completed' "$RUNNER_TEMP/broadcast.txt"

      - name: Existing instrumentation acceptance tests
        shell: bash
        run: |
          set -euxo pipefail
          RUNNER='com.amin.pocketgba.test/androidx.test.runner.AndroidJUnitRunner'
          TESTS=(com.amin.pocketgba.ControlCenterActivityTest com.amin.pocketgba.MainActivitySmokeTest com.amin.pocketgba.NativeSaveBridgeTest com.amin.pocketgba.PermissionCenterActivityTest com.amin.pocketgba.NativeUpdateActivityTest com.amin.pocketgba.VoiceCommandActivityTest)
          for TEST in "${TESTS[@]}"; do
            OUT="$RUNNER_TEMP/$(echo "$TEST" | tr '.' '_').txt"
            adb shell am instrument -w -e class "$TEST" "$RUNNER" > "$OUT"
            cat "$OUT"
            grep -F 'OK (' "$OUT"
          done

      - name: Upload CI debug APK
        uses: actions/upload-artifact@v4
        with:
          name: amin-control-api-v1-debug-apk
          path: android-native/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
