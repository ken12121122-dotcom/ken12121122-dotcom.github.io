name: Bootstrap Amin Control API v1 sources

on:
  push:
    branches:
      - feature/amin-control-api-v1
    paths:
      - .github/workflows/amin-control-api-v1-bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/amin-control-api-v1
          fetch-depth: 0
      - name: Materialize reviewed source bundle
        shell: bash
        env:
          BUNDLE_B64: [...TRUNCATED_FOR_MESSAGE_LIMIT...]
        run: |
          set -euxo pipefail
          printf '%s' "$BUNDLE_B64" | base64 --decode > "$RUNNER_TEMP/amin-control-api-v1.tar.gz"
          echo 'd17bed494615a879dba1a500836ea69f7a55443e4af007a49a26141a9d38eba2  '"$RUNNER_TEMP/amin-control-api-v1.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/amin-control-api-v1.tar.gz" -C "$GITHUB_WORKSPACE"
          rm -f .github/workflows/amin-control-api-v1-bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: materialize Amin Control API v1 testable implementation'
          git push origin HEAD:feature/amin-control-api-v1
