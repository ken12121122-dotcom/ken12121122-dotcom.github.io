name: Publish Amin Pocket GBA Bridge 16 Update

on:
  workflow_run:
    workflows:
      - Build Amin Pocket GBA Bridge 16
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'agent/amin-pocket-gba-universal-control-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Bridge 16 artifact
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge16
          path: /tmp/bridge16
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and publish
        shell: bash
        run: |
          set -euxo pipefail
          SRC='/tmp/bridge16/Amin-Pocket-GBA-v0.9.2-bridge16.apk'
          CERT='/tmp/bridge16/APK_SIGNING_CERTIFICATE.txt'
          test -s "$SRC"
          test -s "$CERT"
          grep -q 'PERMANENT SIGNING ENABLED' /tmp/bridge16/SIGNING_STATUS.txt
          grep -qi '3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$CERT"
          SHA="$(sha256sum "$SRC" | cut -d' ' -f1)"
          SIZE="$(stat -c '%s' "$SRC")"
          mkdir -p amin-vault/releases
          cp "$SRC" amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge16.apk

          python3 - "$SHA" "$SIZE" <<'PY'
          import json
          import sys
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          sha, size = sys.argv[1], int(sys.argv[2])
          taipei = timezone(timedelta(hours=8))
          manifest = {
              "format": "amin-native-release-manifest",
              "manifestVersion": 1,
              "channel": "bridge",
              "enabled": True,
              "packageId": "com.amin.pocketgba",
              "latestVersionName": "0.9.2-bridge16",
              "latestVersionCode": 112,
              "minimumSupportedVersionCode": 107,
              "minimumAndroidSdk": 26,
              "apkUrl": "https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge16.apk",
              "apkSha256": sha,
              "signerCertificateSha256": "3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7",
              "sizeBytes": size,
              "publishedAt": datetime.now(taipei).isoformat(timespec="seconds"),
              "mandatory": False,
              "releaseNotes": [
                  "新增游標位移距離設定，範圍 2 至 64 dp，預設 16 dp，並提供 8、16、32 dp 快速選項。",
                  "方向鍵長按改為連續移動；在捲動模式下則會連續滑動畫面。",
                  "長按 Select 可在游標模式與捲動模式之間切換，切換時顯示短暫提示。",
                  "保留完整 GBA 十字鍵、喚醒球、自動淡化與按鍵自動收合。"
              ]
          }
          Path('amin-vault/native-release-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Commit update channel
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json \
                  amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge16.apk
          git commit -m 'Publish signed Bridge 16 code 112 control modes and tuning'
          git push origin HEAD:main
