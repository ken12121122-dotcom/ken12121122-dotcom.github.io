name: Voice Command v1 CI

on:
  push:
    branches:
      - ai/voice-command-v1
  pull_request:
    branches:
      - agent/amin-pocket-gba-universal-control-v01
    paths:
      - 'android-native/**'
      - '.github/workflows/voice-command-v1-ci.yml'

permissions:
  contents: read

jobs:
  android-voice-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        working-directory: android-native
        run: chmod +x gradlew

      - name: Run voice parser unit tests
        working-directory: android-native
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Compile debug APK
        working-directory: android-native
        run: ./gradlew assembleDebug --stacktrace

      - name: Run Android lint
        working-directory: android-native
        run: ./gradlew lintDebug --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-command-v1-test-reports
          if-no-files-found: ignore
          path: |
            android-native/app/build/reports/tests/
            android-native/app/build/reports/lint-results-debug.html
            android-native/app/build/test-results/

      - name: Upload unsigned debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: amin-voice-command-v1-debug-apk
          if-no-files-found: error
          path: android-native/app/build/outputs/apk/debug/*.apk
