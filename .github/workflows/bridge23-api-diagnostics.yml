name: Bridge 23 API diagnostics

on:
  pull_request:
    branches:
      - ci/amin-control-api-v1-validation-base
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: bridge23-api-diagnostics
  cancel-in-progress: true

jobs:
  android-35-api-diagnostics:
    if: github.head_ref == 'release/bridge23-amin-control-api-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: release/bridge23-amin-control-api-v1
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'emulator' 'platforms;android-35' 'build-tools;35.0.0' 'system-images;android-35;google_apis;x86_64'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Bundle EmulatorJS and mGBA
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs"
          TARGET='android-native/app/src/main/assets/emulator'
          curl -fL --retry 4 'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' -o "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"
          curl -fL --retry 4 'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' -o "$RUNNER_TEMP/emulator.zip"
          unzip -o "$RUNNER_TEMP/emulator.zip" -d "$TARGET"
          curl -fL --retry 4 'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' -o "$TARGET/cores/mgba-wasm.data"

      - name: Build diagnostic APKs
        run: gradle --no-daemon --console=plain -p android-native :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Boot emulator
        run: |
          set -euxo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd --force --name amin_diag --package 'system-images;android-35;google_apis;x86_64' --device pixel_7
          nohup env -u RUNNER_TRACKING_ID ANDROID_AVD_HOME="$ANDROID_AVD_HOME" \
            "$ANDROID_HOME/emulator/emulator" -avd amin_diag -no-window -gpu swiftshader_indirect -accel on -cores 2 -memory 3072 -noaudio -no-boot-anim -no-snapshot -wipe-data \
            > "$RUNNER_TEMP/emulator.log" 2>&1 &
          PID=$!
          adb start-server
          for i in $(seq 1 120); do
            kill -0 "$PID" || { cat "$RUNNER_TEMP/emulator.log"; exit 1; }
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = 1 ] && break
            sleep 5
          done
          adb shell getprop sys.boot_completed | grep -Fx 1
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Run API diagnostic test
        id: api_test
        shell: bash
        run: |
          set +e
          adb install -r android-native/app/build/outputs/apk/debug/app-debug.apk
          adb install -r android-native/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          adb shell am instrument -w -r \
            -e class com.amin.pocketgba.AminControlApiInstrumentedTest \
            com.amin.pocketgba.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/api-test.txt" 2>&1
          STATUS=$?
          adb logcat -d -v threadtime > "$RUNNER_TEMP/logcat.txt" 2>&1
          cat "$RUNNER_TEMP/api-test.txt"
          exit "$STATUS"

      - name: Upload API diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bridge23-API-Diagnostics
          retention-days: 14
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/api-test.txt
            ${{ runner.temp }}/logcat.txt
            ${{ runner.temp }}/emulator.log
