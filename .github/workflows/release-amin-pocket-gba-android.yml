name: Release Amin Pocket GBA Android

on:
  push:
    branches:
      - agent/amin-pocket-gba-update-bridge
    paths:
      - '.github/workflows/release-amin-pocket-gba-android.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to create, for example amin-pocket-gba-v0.9.2-bridge1
        required: true
        default: amin-pocket-gba-v0.9.2-bridge1
      publish_github_release:
        description: Publish the permanently signed Bridge APK as a draft GitHub Release
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: amin-pocket-gba-release
  cancel-in-progress: false

jobs:
  build-signed-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Validate and decode permanent signing secrets
        shell: bash
        env:
          AMIN_KEYSTORE_BASE64: ${{ secrets.AMIN_KEYSTORE_BASE64 }}
          AMIN_KEYSTORE_PASSWORD: ${{ secrets.AMIN_KEYSTORE_PASSWORD }}
          AMIN_KEY_ALIAS: ${{ secrets.AMIN_KEY_ALIAS }}
          AMIN_KEY_PASSWORD: ${{ secrets.AMIN_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$AMIN_KEYSTORE_BASE64" || { echo 'Missing AMIN_KEYSTORE_BASE64'; exit 1; }
          test -n "$AMIN_KEYSTORE_PASSWORD" || { echo 'Missing AMIN_KEYSTORE_PASSWORD'; exit 1; }
          test -n "$AMIN_KEY_ALIAS" || { echo 'Missing AMIN_KEY_ALIAS'; exit 1; }
          test -n "$AMIN_KEY_PASSWORD" || { echo 'Missing AMIN_KEY_PASSWORD'; exit 1; }
          printf '%s' "$AMIN_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/amin-release.jks"
          test -s "$RUNNER_TEMP/amin-release.jks"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build permanently signed Bridge 1 APK
        env:
          AMIN_KEYSTORE_PATH: ${{ runner.temp }}/amin-release.jks
          AMIN_KEYSTORE_PASSWORD: ${{ secrets.AMIN_KEYSTORE_PASSWORD }}
          AMIN_KEY_ALIAS: ${{ secrets.AMIN_KEY_ALIAS }}
          AMIN_KEY_PASSWORD: ${{ secrets.AMIN_KEY_PASSWORD }}
        run: |
          set -euxo pipefail
          gradle --no-daemon --stacktrace -p android-native \
            verifyAminReleaseSigning \
            :app:assembleBridge \
            :app:lintBridge

      - name: Verify Bridge APK signature package and version
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/bridge/app-bridge.apk'
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          test -f "$APK"
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee /tmp/apksigner.txt
          grep -q 'Verified using v2 scheme (APK Signature Scheme v2): true' /tmp/apksigner.txt
          "$AAPT" dump badging "$APK" | tee /tmp/bridge-badging.txt
          grep -q "package: name='com.amin.pocketgba' versionCode='97' versionName='0.9.2-bridge1'" /tmp/bridge-badging.txt
          grep -q "application-label:'Amin Pocket GBA Bridge 0.9.2 B1'" /tmp/bridge-badging.txt

      - name: Prepare signed Bridge release artifact
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          APK='android-native/app/build/outputs/apk/bridge/app-bridge.apk'
          FILE='Amin-Pocket-GBA-v0.9.2-bridge1.apk'
          cp "$APK" "dist/$FILE"
          cp /tmp/apksigner.txt dist/SIGNER-CERTIFICATE.txt
          cd dist
          sha256sum "$FILE" > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          apk = Path('Amin-Pocket-GBA-v0.9.2-bridge1.apk')
          metadata = {
              'format': 'amin-native-release-candidate',
              'packageId': 'com.amin.pocketgba',
              'versionName': '0.9.2-bridge1',
              'versionCode': 97,
              'sizeBytes': apk.stat().st_size,
              'apkSha256': hashlib.sha256(apk.read_bytes()).hexdigest(),
              'nativeUpdateManifestEnabled': False,
              'note': 'Initial Bridge installation remains manual. Enable native-release-manifest.json only for a later higher version code signed by the same certificate.'
          }
          Path('BRIDGE_RELEASE_METADATA.json').write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Upload signed Bridge APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge1-permanently-signed
          path: dist/
          if-no-files-found: error
          retention-days: 90

      - name: Publish draft GitHub Release
        if: ${{ inputs.publish_github_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Amin Pocket GBA v0.9.2 Bridge 1
          draft: true
          prerelease: true
          generate_release_notes: true
          files: |
            dist/Amin-Pocket-GBA-v0.9.2-bridge1.apk
            dist/SHA256SUMS.txt
            dist/SIGNER-CERTIFICATE.txt
            dist/BRIDGE_RELEASE_METADATA.json
