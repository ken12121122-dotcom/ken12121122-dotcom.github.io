name: Bridge 23 formal signing and publish

on:
  pull_request:
    branches:
      - ci/amin-control-api-v1-validation-base
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: publish-amin-pocket-gba-bridge23
  cancel-in-progress: true

jobs:
  sign-upgrade-publish:
    if: github.head_ref == 'release/bridge23-amin-control-api-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AMIN_KEYSTORE_BASE64: ${{ secrets.AMIN_KEYSTORE_BASE64 }}
      AMIN_KEYSTORE_PASSWORD: ${{ secrets.AMIN_KEYSTORE_PASSWORD }}
      AMIN_KEY_ALIAS: ${{ secrets.AMIN_KEY_ALIAS }}
      AMIN_KEY_PASSWORD: ${{ secrets.AMIN_KEY_PASSWORD }}

    steps:
      - name: Checkout formal Bridge 23 source
        uses: actions/checkout@v6
        with:
          ref: release/bridge23-amin-control-api-v1
          fetch-depth: 0

      - name: Verify single formal package contract
        shell: bash
        run: |
          set -euxo pipefail
          grep -Fq "'119'" android-native/app/build.gradle
          grep -Fq "'-bridge23'" android-native/app/build.gradle
          grep -Fq "applicationId 'com.amin.pocketgba'" android-native/app/build.gradle
          ! grep -Fq 'applicationIdSuffix' android-native/app/build.gradle
          ! grep -R -Fq 'api1test' android-native AMIN_CONTROL_API_V1.md
          grep -Fq 'AminInputGateway gateway = AminInputGateway.get(service)' android-native/app/src/main/java/com/amin/pocketgba/FloatingVoiceController.java
          grep -Fq 'AminControlApiInstrumentedTest' android-native/app/src/androidTest/java/com/amin/pocketgba/AminControlApiInstrumentedTest.java
          git diff --exit-code origin/main -- amin-vault/native-release-manifest.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platform-tools' \
            'emulator' \
            'platforms;android-35' \
            'build-tools;35.0.0' \
            'system-images;android-35;google_apis;x86_64'

      - name: Enable KVM
        shell: bash
        run: |
          set -euxo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Validate runtime contracts
        run: node --test tests/*.test.mjs

      - name: Bundle EmulatorJS and mGBA
        shell: bash
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs-v4.2.3.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs-v4.2.3"
          MIN_ZIP="$RUNNER_TEMP/emulator.min.zip"
          TARGET='android-native/app/src/main/assets/emulator'
          curl --fail --location --retry 4 --retry-delay 2 'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' --output "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' --output "$MIN_ZIP"
          unzip -o "$MIN_ZIP" -d "$TARGET"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' --output "$TARGET/cores/mgba-wasm.data"

      - name: Build debug instrumentation and lint
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            :app:testDebugUnitTest \
            :app:assembleDebug \
            :app:lintDebug \
            :app:assembleDebugAndroidTest

      - name: Boot Android 35 emulator
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd --force --name amin_bridge23_api35 --package 'system-images;android-35;google_apis;x86_64' --device 'pixel_7'
          nohup env -u RUNNER_TRACKING_ID ANDROID_AVD_HOME="$ANDROID_AVD_HOME" \
            "$ANDROID_HOME/emulator/emulator" -avd amin_bridge23_api35 -no-window \
            -gpu swiftshader_indirect -accel on -cores 2 -memory 3072 -noaudio \
            -no-boot-anim -no-snapshot -wipe-data -camera-back none \
            > "$RUNNER_TEMP/bridge23-emulator.log" 2>&1 &
          EMULATOR_PID=$!
          adb start-server
          BOOTED=0
          for attempt in $(seq 1 120); do
            if ! kill -0 "$EMULATOR_PID" 2>/dev/null; then
              cat "$RUNNER_TEMP/bridge23-emulator.log"
              exit 1
            fi
            if [ "$(adb get-state 2>/dev/null || true)" = device ] \
              && [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = 1 ]; then
              BOOTED=1
              break
            fi
            sleep 5
          done
          test "$BOOTED" -eq 1
          adb shell getprop ro.build.version.sdk | grep -Fx '35'
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Run Amin Control API Android closed loop
        shell: bash
        run: |
          set -euxo pipefail
          APP_APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          TEST_APK='android-native/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk'
          adb install -r "$APP_APK"
          adb install -r "$TEST_APK"
          RUNNER='com.amin.pocketgba.test/androidx.test.runner.AndroidJUnitRunner'
          OUT="$RUNNER_TEMP/AminControlApiInstrumentedTest.txt"
          adb shell am instrument -w \
            -e class com.amin.pocketgba.AminControlApiInstrumentedTest \
            "$RUNNER" > "$OUT"
          cat "$OUT"
          grep -F 'OK (' "$OUT"

      - name: Prepare permanent signer
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AMIN_KEYSTORE_BASE64:-}"
          test -n "${AMIN_KEYSTORE_PASSWORD:-}"
          test -n "${AMIN_KEY_ALIAS:-}"
          test -n "${AMIN_KEY_PASSWORD:-}"
          KEYSTORE_PATH="$RUNNER_TEMP/amin-pocket-gba.jks"
          printf '%s' "$AMIN_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"
          echo "AMIN_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build permanently signed Bridge 23
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            -PAMIN_VERSION_CODE=119 \
            -PAMIN_BRIDGE_SUFFIX=-bridge23 \
            :app:testBridgeUnitTest \
            :app:assembleBridge \
            :app:lintBridge

      - name: Inspect package version components and signer
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/bridge/app-bridge.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          test -s "$APK"
          "$AAPT" dump badging "$APK" | tee "$RUNNER_TEMP/bridge23-badging.txt"
          grep -Fq "package: name='com.amin.pocketgba' versionCode='119' versionName='0.9.2-bridge23'" "$RUNNER_TEMP/bridge23-badging.txt"
          grep -Fq "application-label:'Amin Pocket GBA'" "$RUNNER_TEMP/bridge23-badging.txt"
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee "$RUNNER_TEMP/bridge23-manifest.txt"
          grep -Fq 'AminControlApiActivity' "$RUNNER_TEMP/bridge23-manifest.txt"
          grep -Fq 'AminControlApiService' "$RUNNER_TEMP/bridge23-manifest.txt"
          grep -Fq 'AminAutomationReceiver' "$RUNNER_TEMP/bridge23-manifest.txt"
          grep -Fq 'AminAutomationActivity' "$RUNNER_TEMP/bridge23-manifest.txt"
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee "$RUNNER_TEMP/bridge23-signing.txt"
          grep -Fqi '3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$RUNNER_TEMP/bridge23-signing.txt"

      - name: Prove Bridge 22 to Bridge 23 in-place update
        shell: bash
        run: |
          set -euxo pipefail
          OLD_APK="$RUNNER_TEMP/Amin-Pocket-GBA-v0.9.2-bridge22.apk"
          NEW_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/bridge/app-bridge.apk"
          curl --fail --location --retry 4 --retry-delay 2 \
            'https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge22.apk' \
            --output "$OLD_APK"
          adb uninstall com.amin.pocketgba || true
          adb install "$OLD_APK"
          adb shell dumpsys package com.amin.pocketgba | grep -F 'versionCode=118'
          adb install -r "$NEW_APK"
          adb shell dumpsys package com.amin.pocketgba | grep -F 'versionCode=119'
          adb shell dumpsys package com.amin.pocketgba | grep -F 'versionName=0.9.2-bridge23'

      - name: Publish exactly one formal APK
        shell: bash
        run: |
          set -euxo pipefail
          APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/bridge/app-bridge.apk"
          APK_SHA="$(sha256sum "$APK" | awk '{print $1}')"
          APK_SIZE="$(stat -c '%s' "$APK")"
          git fetch origin main
          rm -rf "$RUNNER_TEMP/amin-main"
          git worktree add --detach "$RUNNER_TEMP/amin-main" origin/main
          MAIN="$RUNNER_TEMP/amin-main"
          EXISTING_CODE="$(python3 -c "import json; print(json.load(open('$MAIN/amin-vault/native-release-manifest.json'))['latestVersionCode'])")"
          if [ "$EXISTING_CODE" -ge 119 ]; then
            test "$EXISTING_CODE" -eq 119
            test -s "$MAIN/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk"
            exit 0
          fi
          mkdir -p "$MAIN/amin-vault/releases"
          RELEASE_FILE="$MAIN/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk"
          cp "$APK" "$RELEASE_FILE"
          PUBLISHED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          export APK_SHA APK_SIZE PUBLISHED_AT
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          main = Path(os.environ['RUNNER_TEMP']) / 'amin-main'
          manifest = {
              'format': 'amin-native-release-manifest',
              'manifestVersion': 1,
              'channel': 'bridge',
              'enabled': True,
              'packageId': 'com.amin.pocketgba',
              'latestVersionName': '0.9.2-bridge23',
              'latestVersionCode': 119,
              'minimumSupportedVersionCode': 107,
              'minimumAndroidSdk': 26,
              'apkUrl': 'https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk',
              'apkSha256': os.environ['APK_SHA'],
              'signerCertificateSha256': '3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7',
              'sizeBytes': int(os.environ['APK_SIZE']),
              'publishedAt': os.environ['PUBLISHED_AT'],
              'mandatory': False,
              'releaseNotes': [
                  '新增 Amin Control API v1，語音、REST、WebSocket 與 Android 自動化入口統一進入 AminInputGateway。',
                  '新增 localhost REST API、雙向 WebSocket、ExecutionResult、事件推送與稽核紀錄。',
                  '新增使用者主動開啟的 LAN 模式，包含權杖、CIDR 允許清單與速率限制。',
                  '新增 Broadcast Intent、Explicit Intent、Deep Link、Tasker、MacroDroid、Automate 與 ADB 控制。',
                  '使用原套件與永久簽章直接升級，保留 GBA 存檔及既有設定。'
              ]
          }
          path = main / 'amin-vault' / 'native-release-manifest.json'
          path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          cd "$MAIN"
          python3 -m json.tool amin-vault/native-release-manifest.json >/dev/null
          sha256sum -c <(printf '%s  %s\n' "$APK_SHA" 'amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk')
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk
          git commit -m 'release: publish signed Bridge 23 Amin Control API v1'
          git push origin HEAD:main

      - name: Upload the single signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge23-signed
          retention-days: 30
          if-no-files-found: error
          path: |
            android-native/app/build/outputs/apk/bridge/app-bridge.apk
            ${{ runner.temp }}/bridge23-badging.txt
            ${{ runner.temp }}/bridge23-manifest.txt
            ${{ runner.temp }}/bridge23-signing.txt
