name: Apply floating bubble voice repair from PR

on:
  pull_request:
    branches:
      - release/bridge19-voice-catalog
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-source:
    if: github.head_ref == 'fix/floating-bubble-voice-launch-android15' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply Android 15 launch repair
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path

          service_path = Path('android-native/app/src/main/java/com/amin/pocketgba/UniversalControlAccessibilityService.java')
          service = service_path.read_text(encoding='utf-8')
          old_service = "\n".join([
              "    private void openVoiceCommand() {",
              "        Intent intent = new Intent(this, VoiceCommandActivity.class);",
              "        intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP);",
              "        startActivity(intent);",
              "        showStatusToast(\"已開啟 Amin 語音指令\");",
              "    }",
              ""
          ])
          new_service = "\n".join([
              "    private void openVoiceCommand() {",
              "        VoiceCommandActivityLauncher.LaunchResult result =",
              "                VoiceCommandActivityLauncher.openFromFloatingBubble(this);",
              "        if (!result.isSuccess()) {",
              "            showStatusToast(result.getMessage());",
              "            return;",
              "        }",
              "        mainHandler.postDelayed(() -> {",
              "            if (!VoiceCommandActivityLauncher.wasAcknowledged(result.getToken())) {",
              "                showStatusToast(\"語音頁未能開啟，請再長按一次\");",
              "            }",
              "        }, 1500L);",
              "    }",
              ""
          ])
          if old_service not in service:
              raise SystemExit('Expected openVoiceCommand implementation not found')
          service_path.write_text(service.replace(old_service, new_service, 1), encoding='utf-8')

          activity_path = Path('android-native/app/src/main/java/com/amin/pocketgba/VoiceCommandActivity.java')
          activity = activity_path.read_text(encoding='utf-8')
          old_activity = "\n".join([
              "    @Override",
              "    protected void onCreate(Bundle savedInstanceState) {",
              "        super.onCreate(savedInstanceState);",
              "        buildUi();",
              "        prepareRecognizer();",
              "    }",
              ""
          ])
          new_activity = "\n".join([
              "    @Override",
              "    protected void onCreate(Bundle savedInstanceState) {",
              "        super.onCreate(savedInstanceState);",
              "        VoiceCommandActivityLauncher.acknowledgeLaunch(getIntent());",
              "        buildUi();",
              "        prepareRecognizer();",
              "    }",
              "",
              "    @Override",
              "    protected void onNewIntent(Intent intent) {",
              "        super.onNewIntent(intent);",
              "        setIntent(intent);",
              "        VoiceCommandActivityLauncher.acknowledgeLaunch(intent);",
              "    }",
              ""
          ])
          if old_activity not in activity:
              raise SystemExit('Expected VoiceCommandActivity onCreate implementation not found')
          activity_path.write_text(activity.replace(old_activity, new_activity, 1), encoding='utf-8')
          PY

      - name: Commit repaired Java source
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            android-native/app/src/main/java/com/amin/pocketgba/UniversalControlAccessibilityService.java \
            android-native/app/src/main/java/com/amin/pocketgba/VoiceCommandActivity.java
          git commit -m 'fix: connect floating bubble voice launch on Android 15'
          git push origin HEAD:${{ github.head_ref }}
