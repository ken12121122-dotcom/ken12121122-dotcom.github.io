name: Ingest Amin App Error Reports

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
  push:
    paths:
      - '.github/workflows/ingest-amin-app-reports.yml'

permissions:
  contents: read
  issues: write

concurrency:
  group: amin-app-error-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPORT_FEED_URL: https://iqftezadvzugjcvuwmzw.supabase.co/functions/v1/amin-error-reporter

    steps:
      - name: Create or update diagnostic issues
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import datetime as dt
          import hashlib
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from collections import defaultdict

          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          feed_url = os.environ['REPORT_FEED_URL']
          api_root = f'https://api.github.com/repos/{repository}'

          def api(method, path, payload=None, allow_status=()):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              request = urllib.request.Request(
                  f'{api_root}{path}',
                  data=data,
                  method=method,
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'amin-app-error-ingest',
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode('utf-8')
                      return json.loads(body) if body else None
              except urllib.error.HTTPError as error:
                  if error.code in allow_status:
                      return None
                  detail = error.read().decode('utf-8', errors='replace')
                  raise RuntimeError(f'GitHub API {method} {path}: HTTP {error.code}: {detail}') from error

          def fetch_json(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      'Accept': 'application/json',
                      'User-Agent': 'amin-github-actions-feed-v1',
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode('utf-8'))

          def markdown_safe(value, limit=8000):
              text = str(value or '').replace('```', '` ` `').strip()
              return text[:limit]

          def ensure_label(name, color, description):
              api('POST', '/labels', {
                  'name': name,
                  'color': color,
                  'description': description,
              }, allow_status=(422,))

          now = dt.datetime.now(dt.timezone.utc)
          since = (now - dt.timedelta(minutes=30)).isoformat().replace('+00:00', 'Z')
          query = urllib.parse.urlencode({'feed': 'github-actions', 'since': since})
          feed = fetch_json(f'{feed_url}?{query}')
          reports = feed.get('reports') if isinstance(feed, dict) else None
          if not reports:
              print('No sanitized app reports found in the current window.')
              raise SystemExit(0)

          ensure_label('auto-report', 'd73a4a', 'Automatically generated from sanitized Amin app diagnostics')
          ensure_label('gba-runtime', '7057ff', 'Amin GBA runtime, emulator, storage or save issue')

          issues = api('GET', '/issues?state=all&labels=auto-report&per_page=100') or []
          issues_by_fingerprint = {}
          for issue in issues:
              if issue.get('pull_request'):
                  continue
              body = issue.get('body') or ''
              marker = '<!-- amin-fingerprint:'
              start = body.find(marker)
              if start < 0:
                  continue
              end = body.find(' -->', start)
              if end < 0:
                  continue
              fingerprint = body[start + len(marker):end].strip()
              if fingerprint:
                  issues_by_fingerprint[fingerprint] = issue

          grouped = defaultdict(list)
          for report in reports:
              fingerprint = str(report.get('fingerprint') or '')
              report_id = str(report.get('id') or '')
              if len(fingerprint) == 64 and report_id:
                  grouped[fingerprint].append(report)

          def report_block(group, include_heading=True):
              first = group[0]
              report_ids = sorted(str(item.get('id')) for item in group)
              batch = hashlib.sha256(','.join(report_ids).encode('utf-8')).hexdigest()[:20]
              created = [str(item.get('created_at') or '') for item in group]
              environment = first.get('environment') if isinstance(first.get('environment'), dict) else {}
              lines = [
                  f'<!-- amin-report-batch:{batch} -->',
                  f'<!-- amin-report-ids:{",".join(report_ids)} -->',
              ]
              if include_heading:
                  lines.append('## New automatic diagnostic batch')
              lines.extend([
                  '',
                  f'- **Occurrences in this batch:** {len(group)}',
                  f'- **First seen:** `{min(created)}`',
                  f'- **Last seen:** `{max(created)}`',
                  f'- **Category:** `{markdown_safe(first.get("category"), 80)}`',
                  f'- **Stage:** `{markdown_safe(first.get("stage"), 120)}`',
                  f'- **App:** `{markdown_safe(first.get("app_version_name"), 80)}` · code `{first.get("app_version_code")}`',
                  f'- **Runtime:** `{markdown_safe(first.get("runtime_version"), 80)}`',
                  '',
                  '### Message',
                  '',
                  '```text',
                  markdown_safe(first.get('message'), 2000),
                  '```',
              ])
              stack = markdown_safe(first.get('stack'), 8000)
              if stack:
                  lines.extend(['', '### Stack / recent console errors', '', '```text', stack, '```'])
              lines.extend([
                  '',
                  '### Sanitized environment',
                  '',
                  '```json',
                  json.dumps(environment, ensure_ascii=False, indent=2, sort_keys=True)[:12000],
                  '```',
                  '',
                  '> Privacy guard: ROM bytes, save contents, game filenames, email addresses and device paths are removed before this reaches GitHub.',
              ])
              return '\n'.join(lines), batch

          for fingerprint, group in grouped.items():
              group.sort(key=lambda item: str(item.get('created_at') or ''))
              first = group[0]
              block, batch = report_block(group)
              issue = issues_by_fingerprint.get(fingerprint)

              if issue:
                  number = int(issue['number'])
                  comments = api('GET', f'/issues/{number}/comments?per_page=100') or []
                  batch_marker = f'<!-- amin-report-batch:{batch} -->'
                  if batch_marker in (issue.get('body') or '') or any(
                      batch_marker in (comment.get('body') or '') for comment in comments
                  ):
                      print(f'Issue #{number}: batch {batch} already ingested.')
                      continue
                  api('POST', f'/issues/{number}/comments', {'body': block})
                  if issue.get('state') == 'closed':
                      api('PATCH', f'/issues/{number}', {'state': 'open'})
                  print(f'Updated issue #{number} for {fingerprint[:12]}.')
                  continue

              category = markdown_safe(first.get('category'), 60) or 'app-error'
              stage = markdown_safe(first.get('stage'), 80) or 'unknown-stage'
              message = markdown_safe(first.get('message'), 80).replace('\n', ' ')
              title = f'[Auto Report] {category} · {stage}'
              if message:
                  title += f' · {message}'
              title = title[:240]
              body = '\n'.join([
                  f'<!-- amin-fingerprint:{fingerprint} -->',
                  '# Automatic Amin app diagnostic',
                  '',
                  'Reports with the same sanitized fingerprint are merged into this issue.',
                  '',
                  block,
              ])
              created = api('POST', '/issues', {
                  'title': title,
                  'body': body,
                  'labels': ['auto-report', 'gba-runtime'],
              })
              print(f'Created issue #{created["number"]} for {fingerprint[:12]}.')
          PY
