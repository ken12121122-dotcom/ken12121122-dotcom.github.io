name: Amin MCP CI

on:
  pull_request:
    paths:
      - "amin-mcp/**"
      - ".github/workflows/amin-mcp-ci.yml"
  push:
    branches:
      - "ai/amin-mcp-v0-1"
    paths:
      - "amin-mcp/**"
      - ".github/workflows/amin-mcp-ci.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: amin-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: amin-mcp/package-lock.json
      - run: npm install
      - run: npm run check
