name: Publish Amin Pocket GBA Bridge 23

on:
  push:
    branches:
      - release/bridge23-amin-control-api-v1
    paths:
      - 'android-native/**'
      - 'tests/**'
      - 'AMIN_CONTROL_API_V1.md'
      - '.github/workflows/publish-amin-pocket-gba-bridge23.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-amin-pocket-gba-bridge23
  cancel-in-progress: false

jobs:
  validate-build-upgrade-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AMIN_KEYSTORE_BASE64: ${{ secrets.AMIN_KEYSTORE_BASE64 }}
      AMIN_KEYSTORE_PASSWORD: ${{ secrets.AMIN_KEYSTORE_PASSWORD }}
      AMIN_KEY_ALIAS: ${{ secrets.AMIN_KEY_ALIAS }}
      AMIN_KEY_PASSWORD: ${{ secrets.AMIN_KEY_PASSWORD }}

    steps:
      - name: Checkout Bridge 23 source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify formal update identity and architecture
        shell: bash
        run: |
          set -euxo pipefail
          test "$GITHUB_REF_NAME" = 'release/bridge23-amin-control-api-v1'
          grep -Fq "'119'" android-native/app/build.gradle
          grep -Fq "'-bridge23'" android-native/app/build.gradle
          grep -Fq "applicationId 'com.amin.pocketgba'" android-native/app/build.gradle
          ! grep -Fq 'applicationIdSuffix' android-native/app/build.gradle
          grep -Fq 'class AminInputGateway' android-native/app/src/main/java/com/amin/pocketgba/AminInputGateway.java
          grep -Fq 'class AminControlHttpServer' android-native/app/src/main/java/com/amin/pocketgba/AminControlHttpServer.java
          grep -Fq 'class AminAutomationReceiver' android-native/app/src/main/java/com/amin/pocketgba/AminAutomationReceiver.java
          grep -Fq 'AminInputGateway gateway = AminInputGateway.get(service)' android-native/app/src/main/java/com/amin/pocketgba/FloatingVoiceController.java
          grep -Fq 'AminControlApiInstrumentedTest' android-native/app/src/androidTest/java/com/amin/pocketgba/AminControlApiInstrumentedTest.java
          grep -Fq 'android.permission.FOREGROUND_SERVICE_SPECIAL_USE' android-native/app/src/main/AndroidManifest.xml
          ! grep -R -Fq 'api1test' android-native AMIN_CONTROL_API_V1.md
          git diff --exit-code origin/main -- amin-vault/native-release-manifest.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 build and emulator tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platform-tools' \
            'emulator' \
            'platforms;android-35' \
            'build-tools;35.0.0' \
            'system-images;android-35;google_apis;x86_64'

      - name: Enable KVM
        shell: bash
        run: |
          set -euxo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run runtime contract tests
        shell: bash
        run: |
          set -euxo pipefail
          node --test tests/*.test.mjs

      - name: Bundle EmulatorJS and mGBA
        shell: bash
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs-v4.2.3.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs-v4.2.3"
          MIN_ZIP="$RUNNER_TEMP/emulator.min.zip"
          TARGET='android-native/app/src/main/assets/emulator'
          curl --fail --location --retry 4 --retry-delay 2 \
            'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' \
            --output "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"
          curl --fail --location --retry 4 --retry-delay 2 \
            'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' \
            --output "$MIN_ZIP"
          unzip -o "$MIN_ZIP" -d "$TARGET"
          curl --fail --location --retry 4 --retry-delay 2 \
            'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' \
            --output "$TARGET/cores/mgba-wasm.data"
          test -s "$TARGET/loader.js"
          test -s "$TARGET/emulator.min.js"
          test -s "$TARGET/emulator.min.css"
          test -s "$TARGET/cores/mgba-wasm.data"

      - name: Unit tests debug build lint and instrumentation build
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            :app:testDebugUnitTest \
            :app:assembleDebug \
            :app:lintDebug \
            :app:assembleDebugAndroidTest

      - name: Inspect debug APK identity
        shell: bash
        run: |
          set -euxo pipefail
          APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/debug/app-debug.apk"
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          "$AAPT" dump badging "$APK" | tee "$RUNNER_TEMP/debug-badging.txt"
          PACKAGE_NAME="$(sed -n "s/^package: name='\([^']*\)'.*/\1/p" "$RUNNER_TEMP/debug-badging.txt" | head -n 1)"
          LAUNCHABLE_ACTIVITY="$(sed -n "s/^launchable-activity: name='\([^']*\)'.*/\1/p" "$RUNNER_TEMP/debug-badging.txt" | head -n 1)"
          test "$PACKAGE_NAME" = 'com.amin.pocketgba'
          test -n "$LAUNCHABLE_ACTIVITY"
          echo "CURRENT_PACKAGE=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "CURRENT_LAUNCHABLE_ACTIVITY=$LAUNCHABLE_ACTIVITY" >> "$GITHUB_ENV"

      - name: Create and boot Android 35 emulator
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd \
            --force \
            --name amin_bridge23_api35 \
            --package 'system-images;android-35;google_apis;x86_64' \
            --device 'pixel_7'
          EMULATOR_LOG="$RUNNER_TEMP/bridge23-emulator.log"
          nohup env -u RUNNER_TRACKING_ID ANDROID_AVD_HOME="$ANDROID_AVD_HOME" \
            "$ANDROID_HOME/emulator/emulator" \
            -avd amin_bridge23_api35 \
            -no-window \
            -gpu swiftshader_indirect \
            -accel on \
            -cores 2 \
            -memory 3072 \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -wipe-data \
            -camera-back none \
            > "$EMULATOR_LOG" 2>&1 &
          EMULATOR_PID=$!
          adb start-server
          BOOTED=0
          for attempt in $(seq 1 120); do
            if ! kill -0 "$EMULATOR_PID" 2>/dev/null; then
              cat "$EMULATOR_LOG"
              exit 1
            fi
            DEVICE_STATE="$(adb get-state 2>/dev/null || true)"
            BOOT_STATE="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            if [ "$DEVICE_STATE" = 'device' ] && [ "$BOOT_STATE" = '1' ]; then
              BOOTED=1
              break
            fi
            sleep 5
          done
          test "$BOOTED" -eq 1
          adb shell input keyevent 82 || true
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell getprop ro.build.version.sdk | grep -Fx '35'

      - name: Install debug and instrumentation APKs
        shell: bash
        run: |
          set -euxo pipefail
          APP_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/debug/app-debug.apk"
          TEST_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"
          adb install -r "$APP_APK"
          adb install -r "$TEST_APK"
          RUNNER="$CURRENT_PACKAGE.test/androidx.test.runner.AndroidJUnitRunner"
          adb shell pm list packages | grep -Fx "package:$CURRENT_PACKAGE"
          adb shell pm list instrumentation | grep -F "$RUNNER"
          echo "CURRENT_TEST_RUNNER=$RUNNER" >> "$GITHUB_ENV"

      - name: Verify launcher API and automation routes
        shell: bash
        run: |
          set -euxo pipefail
          adb shell cmd package resolve-activity --brief \
            -a android.intent.action.MAIN \
            -c android.intent.category.LAUNCHER \
            "$CURRENT_PACKAGE" | tee "$RUNNER_TEMP/launcher.txt"
          adb shell monkey -p "$CURRENT_PACKAGE" -c android.intent.category.LAUNCHER 1
          sleep 2
          adb shell am start -W -a android.intent.action.VIEW \
            -d 'amin-api://settings' -p "$CURRENT_PACKAGE" | grep -F 'Status: ok'
          adb shell input keyevent 4
          adb shell am start -W -a android.intent.action.VIEW \
            -d 'amin-control://execute?action=SYSTEM_HOME' -p "$CURRENT_PACKAGE" | grep -F 'Status: ok'
          adb shell input keyevent 4
          adb shell am broadcast \
            -a com.amin.pocketgba.ACTION_EXECUTE \
            -n "$CURRENT_PACKAGE/com.amin.pocketgba.AminAutomationReceiver" \
            --es amin_action SYSTEM_HOME | tee "$RUNNER_TEMP/automation-broadcast.txt"
          grep -F 'Broadcast completed' "$RUNNER_TEMP/automation-broadcast.txt"

      - name: Run existing and API Android acceptance tests
        shell: bash
        run: |
          set -euxo pipefail
          TESTS=(
            com.amin.pocketgba.ControlCenterActivityTest
            com.amin.pocketgba.MainActivitySmokeTest
            com.amin.pocketgba.NativeSaveBridgeTest
            com.amin.pocketgba.PermissionCenterActivityTest
            com.amin.pocketgba.NativeUpdateActivityTest
            com.amin.pocketgba.VoiceCommandActivityTest
            com.amin.pocketgba.AminControlApiInstrumentedTest
          )
          for TEST in "${TESTS[@]}"; do
            OUT="$RUNNER_TEMP/$(echo "$TEST" | tr '.' '_').txt"
            adb shell am instrument -w -e class "$TEST" "$CURRENT_TEST_RUNNER" > "$OUT"
            cat "$OUT"
            grep -F 'OK (' "$OUT"
          done

      - name: Prepare permanent signing
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AMIN_KEYSTORE_BASE64:-}"
          test -n "${AMIN_KEYSTORE_PASSWORD:-}"
          test -n "${AMIN_KEY_ALIAS:-}"
          test -n "${AMIN_KEY_PASSWORD:-}"
          KEYSTORE_PATH="$RUNNER_TEMP/amin-pocket-gba.jks"
          printf '%s' "$AMIN_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"
          echo "AMIN_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build signed Bridge 23
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            -PAMIN_VERSION_CODE=119 \
            -PAMIN_BRIDGE_SUFFIX=-bridge23 \
            :app:testBridgeUnitTest \
            :app:assembleBridge \
            :app:lintBridge

      - name: Inspect signed Bridge 23 APK
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/bridge/app-bridge.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          test -s "$APK"
          "$AAPT" dump badging "$APK" | tee "$RUNNER_TEMP/bridge23-badging.txt"
          grep -Fq "package: name='com.amin.pocketgba' versionCode='119' versionName='0.9.2-bridge23'" "$RUNNER_TEMP/bridge23-badging.txt"
          grep -Fq "application-label:'Amin Pocket GBA'" "$RUNNER_TEMP/bridge23-badging.txt"
          "$AAPT" dump permissions "$APK" | tee "$RUNNER_TEMP/bridge23-permissions.txt"
          grep -Fq 'android.permission.INTERNET' "$RUNNER_TEMP/bridge23-permissions.txt"
          grep -Fq 'android.permission.FOREGROUND_SERVICE_SPECIAL_USE' "$RUNNER_TEMP/bridge23-permissions.txt"
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee "$RUNNER_TEMP/bridge23-manifest.txt"
          grep -Fq 'AminControlApiActivity' "$RUNNER_TEMP/bridge23-manifest.txt"
          grep -Fq 'AminControlApiService' "$RUNNER_TEMP/bridge23-manifest.txt"
          grep -Fq 'AminAutomationReceiver' "$RUNNER_TEMP/bridge23-manifest.txt"
          grep -Fq 'AminAutomationActivity' "$RUNNER_TEMP/bridge23-manifest.txt"
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee "$RUNNER_TEMP/bridge23-signing.txt"
          grep -Fqi '3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$RUNNER_TEMP/bridge23-signing.txt"

      - name: Prove in-place upgrade from signed Bridge 22
        shell: bash
        run: |
          set -euxo pipefail
          OLD_APK="$RUNNER_TEMP/Amin-Pocket-GBA-v0.9.2-bridge22.apk"
          NEW_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/bridge/app-bridge.apk"
          curl --fail --location --retry 4 --retry-delay 2 \
            'https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge22.apk' \
            --output "$OLD_APK"
          test -s "$OLD_APK"
          adb uninstall com.amin.pocketgba || true
          adb install "$OLD_APK"
          adb shell dumpsys package com.amin.pocketgba | grep -F 'versionCode=118'
          adb install -r "$NEW_APK"
          adb shell dumpsys package com.amin.pocketgba | grep -F 'versionCode=119'
          adb shell dumpsys package com.amin.pocketgba | grep -F 'versionName=0.9.2-bridge23'
          adb shell cmd package resolve-activity --brief \
            -a android.intent.action.MAIN \
            -c android.intent.category.LAUNCHER \
            com.amin.pocketgba

      - name: Publish the single formal APK and update manifest
        shell: bash
        run: |
          set -euxo pipefail
          APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/bridge/app-bridge.apk"
          git fetch origin main
          rm -rf "$RUNNER_TEMP/amin-main"
          git worktree add --detach "$RUNNER_TEMP/amin-main" origin/main
          MAIN="$RUNNER_TEMP/amin-main"
          mkdir -p "$MAIN/amin-vault/releases"
          RELEASE_FILE="$MAIN/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk"
          cp "$APK" "$RELEASE_FILE"
          APK_SHA="$(sha256sum "$RELEASE_FILE" | awk '{print $1}')"
          APK_SIZE="$(stat -c '%s' "$RELEASE_FILE")"
          PUBLISHED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          export APK_SHA APK_SIZE PUBLISHED_AT
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          main = Path(os.environ['RUNNER_TEMP']) / 'amin-main'
          manifest = {
              'format': 'amin-native-release-manifest',
              'manifestVersion': 1,
              'channel': 'bridge',
              'enabled': True,
              'packageId': 'com.amin.pocketgba',
              'latestVersionName': '0.9.2-bridge23',
              'latestVersionCode': 119,
              'minimumSupportedVersionCode': 107,
              'minimumAndroidSdk': 26,
              'apkUrl': 'https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk',
              'apkSha256': os.environ['APK_SHA'],
              'signerCertificateSha256': '3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7',
              'sizeBytes': int(os.environ['APK_SIZE']),
              'publishedAt': os.environ['PUBLISHED_AT'],
              'mandatory': False,
              'releaseNotes': [
                  '新增 Amin Control API v1，所有 REST、WebSocket、語音與 Android 自動化入口統一進入 AminInputGateway。',
                  '新增預設僅限 localhost 的 REST API、雙向 WebSocket、動作列表、ExecutionResult、事件推送與稽核紀錄。',
                  '新增使用者主動開啟的 LAN 模式，包含權杖、CIDR 允許清單與來源 IP 速率限制。',
                  '新增 Broadcast Intent、Explicit Intent、Deep Link、Tasker、MacroDroid、Automate 與 ADB 控制入口。',
                  '保留 Bridge 22 的鍵盤浮球、語音浮球、GBA 存檔、既有設定與永久簽章升級相容性。'
              ]
          }
          path = main / 'amin-vault' / 'native-release-manifest.json'
          path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          cd "$MAIN"
          python3 -m json.tool amin-vault/native-release-manifest.json >/dev/null
          sha256sum -c <(printf '%s  %s\n' "$APK_SHA" 'amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk')
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge23.apk
          git commit -m 'release: publish signed Bridge 23 Amin Control API v1'
          git push origin HEAD:main

      - name: Upload signed Bridge 23 evidence
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge23-signed
          retention-days: 30
          if-no-files-found: error
          path: |
            android-native/app/build/outputs/apk/bridge/app-bridge.apk
            ${{ runner.temp }}/bridge23-badging.txt
            ${{ runner.temp }}/bridge23-permissions.txt
            ${{ runner.temp }}/bridge23-manifest.txt
            ${{ runner.temp }}/bridge23-signing.txt
