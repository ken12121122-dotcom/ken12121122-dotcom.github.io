name: Amin Control API v1 PR validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: amin-control-api-v1-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-35-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout proposed source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Protect Bridge 22 release identity
        shell: bash
        run: |
          set -euxo pipefail
          grep -Fq "'118'" android-native/app/build.gradle
          grep -Fq "'-bridge22'" android-native/app/build.gradle
          git diff --exit-code origin/release/bridge22-independent-floating-toggles -- amin-vault/native-release-manifest.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run JavaScript tests
        run: node --test tests/*.test.mjs

      - name: Bundle EmulatorJS and mGBA
        shell: bash
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs-v4.2.3.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs-v4.2.3"
          MIN_ZIP="$RUNNER_TEMP/emulator.min.zip"
          TARGET='android-native/app/src/main/assets/emulator'
          curl --fail --location --retry 4 --retry-delay 2 'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' --output "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' --output "$MIN_ZIP"
          unzip -o "$MIN_ZIP" -d "$TARGET"
          curl --fail --location --retry 4 --retry-delay 2 'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' --output "$TARGET/cores/mgba-wasm.data"

      - name: Unit tests build lint and instrumentation build
        id: gradle
        shell: bash
        run: |
          set +e
          set -o pipefail
          gradle --no-daemon --console=plain -p android-native \
            :app:testDebugUnitTest \
            :app:assembleDebug \
            :app:lintDebug \
            :app:assembleDebugAndroidTest \
            2>&1 | tee "$RUNNER_TEMP/amin-gradle-build.log"
          STATUS=${PIPESTATUS[0]}
          set -e
          exit "$STATUS"

      - name: Upload complete Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amin-control-api-v1-gradle-log
          path: ${{ runner.temp }}/amin-gradle-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Inspect debug APK
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          test -s "$APK"
          "$AAPT" dump badging "$APK" | tee "$RUNNER_TEMP/badging.txt"
          grep -Fq "package: name='com.amin.pocketgba' versionCode='118'" "$RUNNER_TEMP/badging.txt"
          "$AAPT" dump xmltree "$APK" AndroidManifest.xml | tee "$RUNNER_TEMP/manifest-tree.txt"
          grep -Fq 'AminControlApiActivity' "$RUNNER_TEMP/manifest-tree.txt"
          grep -Fq 'AminAutomationReceiver' "$RUNNER_TEMP/manifest-tree.txt"
          grep -Fq 'AminControlApiService' "$RUNNER_TEMP/manifest-tree.txt"

      - name: Upload CI debug APK
        uses: actions/upload-artifact@v4
        with:
          name: amin-control-api-v1-debug-apk
          path: android-native/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
