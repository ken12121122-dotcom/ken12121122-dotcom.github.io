name: Test Amin Pocket GBA Android Emulator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.js'
      - 'amin-vault/gba*.html'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-emulator-v5-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-35-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 emulator image
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platform-tools' \
            'emulator' \
            'platforms;android-35' \
            'build-tools;35.0.0' \
            'system-images;android-35;google_apis;x86_64'

      - name: Enable KVM
        shell: bash
        run: |
          set -euxo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build Preview 4 app and test APKs
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            :app:assembleDebug \
            :app:assembleDebugAndroidTest

      - name: Build Preview 3 in-place update fixture with same debug signer
        shell: bash
        run: |
          set -euxo pipefail
          git worktree add --detach /tmp/amin-pocket-preview3 58f7760627d8a03a24a72697e5db60104d424fb0
          gradle --no-daemon --console=plain -p /tmp/amin-pocket-preview3/android-native :app:assembleDebug
          test -f /tmp/amin-pocket-preview3/android-native/app/build/outputs/apk/debug/app-debug.apk

      - name: Build v0.9.1 coexistence fixture
        shell: bash
        run: |
          set -euxo pipefail
          git worktree add --detach /tmp/amin-pocket-main origin/main
          gradle --no-daemon --console=plain -p /tmp/amin-pocket-main/android-native :app:assembleDebug
          test -f /tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk

      - name: Create and boot Android 35 AVD
        shell: bash
        run: |
          set -euxo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd \
            --force \
            --name amin_api35 \
            --package 'system-images;android-35;google_apis;x86_64' \
            --device 'pixel_7'

          "$ANDROID_HOME/emulator/emulator" -list-avds | tee "$RUNNER_TEMP/avd-list.txt"
          grep -Fx 'amin_api35' "$RUNNER_TEMP/avd-list.txt"

          EMULATOR_LOG="$RUNNER_TEMP/amin-emulator.log"
          nohup env -u RUNNER_TRACKING_ID ANDROID_AVD_HOME="$ANDROID_AVD_HOME" \
            "$ANDROID_HOME/emulator/emulator" \
            -avd amin_api35 \
            -no-window \
            -gpu swiftshader_indirect \
            -accel on \
            -cores 2 \
            -memory 3072 \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -wipe-data \
            -camera-back none \
            > "$EMULATOR_LOG" 2>&1 &
          EMULATOR_PID=$!
          adb start-server
          BOOTED=0
          for attempt in $(seq 1 120); do
            if ! kill -0 "$EMULATOR_PID" 2>/dev/null; then
              cat "$EMULATOR_LOG"
              exit 1
            fi
            DEVICE_STATE="$(adb get-state 2>/dev/null || true)"
            BOOT_STATE="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            if [ "$DEVICE_STATE" = 'device' ] && [ "$BOOT_STATE" = '1' ]; then
              BOOTED=1
              break
            fi
            sleep 5
          done
          test "$BOOTED" -eq 1
          adb shell input keyevent 82 || true
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell getprop ro.build.version.sdk | grep -Fx '35'

      - name: Install v0.9.1 and Preview 3 fixture
        shell: bash
        run: |
          set -euxo pipefail
          OLD_APK='/tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk'
          PREVIEW3_APK='/tmp/amin-pocket-preview3/android-native/app/build/outputs/apk/debug/app-debug.apk'
          adb install -r "$OLD_APK"
          adb install -r "$PREVIEW3_APK"

      - name: Seed Preview 3 private save marker
        shell: bash
        run: |
          set -euxo pipefail
          PACKAGE='com.amin.pocketgba.preview092'
          adb shell run-as "$PACKAGE" sh -c 'mkdir -p files/gba-saves && printf seed-save-before-update > files/gba-saves/ci-update-retention.sav'
          adb shell run-as "$PACKAGE" cat files/gba-saves/ci-update-retention.sav | grep -Fx 'seed-save-before-update'

      - name: Update Preview 3 in place to Preview 4
        shell: bash
        run: |
          set -euxo pipefail
          NEW_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/debug/app-debug.apk"
          adb install -r "$NEW_APK"
          adb shell run-as com.amin.pocketgba.preview092 cat files/gba-saves/ci-update-retention.sav \
            | grep -Fx 'seed-save-before-update'

      - name: Verify coexistence and Preview 4 identity
        shell: bash
        run: |
          set -euxo pipefail
          OLD_PACKAGE='com.amin.pocketgba.preview091'
          NEW_PACKAGE='com.amin.pocketgba.preview092'
          adb shell pm list packages > "$RUNNER_TEMP/packages.txt"
          grep -F "package:${OLD_PACKAGE}" "$RUNNER_TEMP/packages.txt"
          grep -F "package:${NEW_PACKAGE}" "$RUNNER_TEMP/packages.txt"
          adb shell dumpsys package "$OLD_PACKAGE" > "$RUNNER_TEMP/old-package.txt"
          adb shell dumpsys package "$NEW_PACKAGE" > "$RUNNER_TEMP/new-package.txt"
          grep -F 'versionName=0.9.1-preview' "$RUNNER_TEMP/old-package.txt"
          grep -F 'versionName=0.9.2-preview4' "$RUNNER_TEMP/new-package.txt"
          grep -F 'versionCode=95' "$RUNNER_TEMP/new-package.txt"

      - name: Verify launcher resolves to portrait dashboard
        shell: bash
        run: |
          set -euxo pipefail
          adb shell cmd package resolve-activity --brief \
            -a android.intent.action.MAIN \
            -c android.intent.category.LAUNCHER \
            com.amin.pocketgba.preview092 \
            > "$RUNNER_TEMP/launcher-resolution.txt"
          cat "$RUNNER_TEMP/launcher-resolution.txt"
          grep -F 'ControlCenterActivity' "$RUNNER_TEMP/launcher-resolution.txt"

      - name: Launch portrait dashboard through normal launcher
        shell: bash
        run: |
          set -euxo pipefail
          adb shell monkey -p com.amin.pocketgba.preview092 -c android.intent.category.LAUNCHER 1 \
            > "$RUNNER_TEMP/launcher-output.txt"
          sleep 2
          adb shell dumpsys activity activities > "$RUNNER_TEMP/dashboard-state.txt"
          grep -F 'ControlCenterActivity' "$RUNNER_TEMP/dashboard-state.txt"

      - name: Enter portrait library and return to portrait dashboard
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am start -W \
            -n 'com.amin.pocketgba.preview092/com.amin.pocketgba.MainActivity' \
            > "$RUNNER_TEMP/library-launch.txt"
          cat "$RUNNER_TEMP/library-launch.txt"
          grep -F 'Status: ok' "$RUNNER_TEMP/library-launch.txt"
          sleep 1
          adb shell dumpsys activity activities > "$RUNNER_TEMP/library-state.txt"
          grep -F 'MainActivity' "$RUNNER_TEMP/library-state.txt"

          adb shell input keyevent 4
          sleep 2
          adb shell dumpsys activity activities > "$RUNNER_TEMP/return-state.txt"
          grep -F 'ControlCenterActivity' "$RUNNER_TEMP/return-state.txt"

      - name: Verify Permission Center deep link
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am start -W -a android.intent.action.VIEW \
            -d 'amin-permissions://open' -p 'com.amin.pocketgba.preview092' \
            > "$RUNNER_TEMP/permission-link.txt"
          grep -F 'Status: ok' "$RUNNER_TEMP/permission-link.txt"
          sleep 1
          adb shell dumpsys activity activities > "$RUNNER_TEMP/permission-state.txt"
          grep -F 'PermissionCenterActivity' "$RUNNER_TEMP/permission-state.txt"
          adb shell input keyevent 4

      - name: Verify clean Update Hub deep link
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am start -W -a android.intent.action.VIEW \
            -d 'amin-update://check' -p 'com.amin.pocketgba.preview092' \
            > "$RUNNER_TEMP/update-link.txt"
          grep -F 'Status: ok' "$RUNNER_TEMP/update-link.txt"
          sleep 1
          adb shell dumpsys activity activities > "$RUNNER_TEMP/update-state.txt"
          grep -F 'UpdateHubActivity' "$RUNNER_TEMP/update-state.txt"
          ! grep -F 'NativeUpdateActivity' "$RUNNER_TEMP/update-state.txt"
          adb shell input keyevent 4

      - name: Install Android instrumentation APK
        shell: bash
        run: |
          set -euxo pipefail
          TEST_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"
          adb install -r "$TEST_APK"
          adb shell pm list instrumentation > "$RUNNER_TEMP/instrumentation-list.txt"
          grep -F 'com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner' \
            "$RUNNER_TEMP/instrumentation-list.txt"

      - name: Run portrait dashboard route tests
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am instrument -w \
            -e class com.amin.pocketgba.ControlCenterActivityTest \
            com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/control-center-tests.txt"
          cat "$RUNNER_TEMP/control-center-tests.txt"
          grep -F 'OK (' "$RUNNER_TEMP/control-center-tests.txt"

      - name: Run dynamic orientation tests
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am instrument -w \
            -e class com.amin.pocketgba.MainActivitySmokeTest \
            com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/main-smoke.txt"
          cat "$RUNNER_TEMP/main-smoke.txt"
          grep -F 'OK (' "$RUNNER_TEMP/main-smoke.txt"

      - name: Run native save vault tests
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am instrument -w \
            -e class com.amin.pocketgba.NativeSaveBridgeTest \
            com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/native-save-tests.txt"
          cat "$RUNNER_TEMP/native-save-tests.txt"
          grep -F 'OK (' "$RUNNER_TEMP/native-save-tests.txt"

      - name: Run Permission Center tests
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am instrument -w \
            -e class com.amin.pocketgba.PermissionCenterActivityTest \
            com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/permission-tests.txt"
          cat "$RUNNER_TEMP/permission-tests.txt"
          grep -F 'OK (' "$RUNNER_TEMP/permission-tests.txt"

      - name: Run Update Hub tests
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am instrument -w \
            -e class com.amin.pocketgba.NativeUpdateActivityTest \
            com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/update-tests.txt"
          cat "$RUNNER_TEMP/update-tests.txt"
          grep -F 'OK (' "$RUNNER_TEMP/update-tests.txt"

      - name: Collect emulator diagnostics
        if: ${{ failure() }}
        shell: bash
        run: |
          mkdir -p emulator-diagnostics
          cp "$RUNNER_TEMP"/*.txt emulator-diagnostics/ 2>/dev/null || true
          cp "$RUNNER_TEMP/amin-emulator.log" emulator-diagnostics/ 2>/dev/null || true
          timeout 15 adb logcat -d > emulator-diagnostics/logcat.txt 2>/dev/null || true
          timeout 15 adb exec-out screencap -p > emulator-diagnostics/final-screen.png 2>/dev/null || true

      - name: Upload emulator diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-preview4-emulator-diagnostics
          path: emulator-diagnostics/
          if-no-files-found: warn
          retention-days: 30
