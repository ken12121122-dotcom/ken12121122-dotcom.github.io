name: Test Amin Pocket GBA Android Emulator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android-native/**'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'
  push:
    paths:
      - 'android-native/**'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-emulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-35-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 emulator image
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platform-tools' \
            'emulator' \
            'platforms;android-35' \
            'build-tools;35.0.0' \
            'system-images;android-35;google_apis;x86_64'

      - name: Enable KVM
        shell: bash
        run: |
          set -euxo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build v0.9.2 app and test APKs
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            :app:assembleDebug \
            :app:assembleDebugAndroidTest

      - name: Build v0.9.1 coexistence fixture
        shell: bash
        run: |
          set -euxo pipefail
          git worktree add --detach /tmp/amin-pocket-main origin/main
          gradle --no-daemon --console=plain -p /tmp/amin-pocket-main/android-native :app:assembleDebug
          test -f /tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk

      - name: Create and boot Android 35 AVD
        shell: bash
        run: |
          set -euxo pipefail
          echo no | avdmanager create avd \
            --force \
            --name amin_api35 \
            --package 'system-images;android-35;google_apis;x86_64' \
            --device 'pixel_7'

          EMULATOR_LOG="$RUNNER_TEMP/amin-emulator.log"
          nohup env -u RUNNER_TRACKING_ID "$ANDROID_HOME/emulator/emulator" \
            -avd amin_api35 \
            -no-window \
            -gpu swiftshader_indirect \
            -accel on \
            -cores 2 \
            -memory 3072 \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -wipe-data \
            -camera-back none \
            > "$EMULATOR_LOG" 2>&1 &
          EMULATOR_PID=$!
          echo "$EMULATOR_PID" > "$RUNNER_TEMP/amin-emulator.pid"

          adb start-server
          BOOTED=0
          for attempt in $(seq 1 120); do
            if ! kill -0 "$EMULATOR_PID" 2>/dev/null; then
              echo 'Android Emulator process exited before boot.'
              cat "$EMULATOR_LOG"
              exit 1
            fi

            DEVICE_STATE="$(adb get-state 2>/dev/null || true)"
            BOOT_STATE="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            echo "attempt=$attempt device=$DEVICE_STATE boot=$BOOT_STATE"
            if [ "$DEVICE_STATE" = 'device' ] && [ "$BOOT_STATE" = '1' ]; then
              BOOTED=1
              break
            fi
            sleep 5
          done

          if [ "$BOOTED" -ne 1 ]; then
            echo 'Android Emulator did not finish booting within 10 minutes.'
            cat "$EMULATOR_LOG"
            exit 1
          fi

          adb shell input keyevent 82 || true
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell getprop ro.build.version.sdk | grep -Fx '35'
          adb devices -l

      - name: Install v0.9.1 and v0.9.2 Preview
        shell: bash
        run: |
          set -euxo pipefail
          OLD_APK='/tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk'
          NEW_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$OLD_APK"
          test -f "$NEW_APK"
          adb install -r "$OLD_APK"
          adb install -r "$NEW_APK"

      - name: Verify v0.9.1 and v0.9.2 coexist
        shell: bash
        run: |
          set -euxo pipefail
          OLD_PACKAGE='com.amin.pocketgba.preview091'
          NEW_PACKAGE='com.amin.pocketgba.preview092'
          adb shell pm list packages > "$RUNNER_TEMP/packages.txt"
          grep -F "package:${OLD_PACKAGE}" "$RUNNER_TEMP/packages.txt"
          grep -F "package:${NEW_PACKAGE}" "$RUNNER_TEMP/packages.txt"
          adb shell dumpsys package "$OLD_PACKAGE" > "$RUNNER_TEMP/old-package.txt"
          adb shell dumpsys package "$NEW_PACKAGE" > "$RUNNER_TEMP/new-package.txt"
          grep -F 'versionName=0.9.1-preview' "$RUNNER_TEMP/old-package.txt"
          grep -F 'versionName=0.9.2-preview' "$RUNNER_TEMP/new-package.txt"

      - name: Launch v0.9.1 Preview
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am start -W \
            -n 'com.amin.pocketgba.preview091/com.amin.pocketgba.MainActivity' \
            > "$RUNNER_TEMP/old-launch.txt"
          cat "$RUNNER_TEMP/old-launch.txt"
          grep -F 'Status: ok' "$RUNNER_TEMP/old-launch.txt"
          adb shell am force-stop com.amin.pocketgba.preview091

      - name: Launch v0.9.2 Preview
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am start -W \
            -n 'com.amin.pocketgba.preview092/com.amin.pocketgba.MainActivity' \
            > "$RUNNER_TEMP/new-launch.txt"
          cat "$RUNNER_TEMP/new-launch.txt"
          grep -F 'Status: ok' "$RUNNER_TEMP/new-launch.txt"
          adb shell am force-stop com.amin.pocketgba.preview092

      - name: Verify Permission Center deep link
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am start -W \
            -a android.intent.action.VIEW \
            -d 'amin-permissions://open' \
            -p 'com.amin.pocketgba.preview092' \
            > "$RUNNER_TEMP/permission-link.txt"
          cat "$RUNNER_TEMP/permission-link.txt"
          grep -F 'Status: ok' "$RUNNER_TEMP/permission-link.txt"
          sleep 1
          adb shell dumpsys activity activities > "$RUNNER_TEMP/permission-state.txt"
          grep -F 'PermissionCenterActivity' "$RUNNER_TEMP/permission-state.txt"
          adb shell am force-stop com.amin.pocketgba.preview092

      - name: Verify Native Update Center deep link
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am start -W \
            -a android.intent.action.VIEW \
            -d 'amin-update://check' \
            -p 'com.amin.pocketgba.preview092' \
            > "$RUNNER_TEMP/update-link.txt"
          cat "$RUNNER_TEMP/update-link.txt"
          grep -F 'Status: ok' "$RUNNER_TEMP/update-link.txt"
          sleep 1
          adb shell dumpsys activity activities > "$RUNNER_TEMP/update-state.txt"
          grep -F 'NativeUpdateActivity' "$RUNNER_TEMP/update-state.txt"
          adb shell am force-stop com.amin.pocketgba.preview092

      - name: Install Android instrumentation APK
        shell: bash
        run: |
          set -euxo pipefail
          TEST_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"
          test -f "$TEST_APK"
          adb install -r "$TEST_APK"
          adb shell pm list instrumentation > "$RUNNER_TEMP/instrumentation-list.txt"
          cat "$RUNNER_TEMP/instrumentation-list.txt"
          grep -F 'com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner' \
            "$RUNNER_TEMP/instrumentation-list.txt"

      - name: Run MainActivity smoke tests
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am instrument -w \
            -e class com.amin.pocketgba.MainActivitySmokeTest \
            com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/main-smoke.txt"
          cat "$RUNNER_TEMP/main-smoke.txt"
          grep -F 'OK (' "$RUNNER_TEMP/main-smoke.txt"

      - name: Run Permission Center tests
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am instrument -w \
            -e class com.amin.pocketgba.PermissionCenterActivityTest \
            com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/permission-tests.txt"
          cat "$RUNNER_TEMP/permission-tests.txt"
          grep -F 'OK (' "$RUNNER_TEMP/permission-tests.txt"

      - name: Run Native Update Center tests
        shell: bash
        run: |
          set -euxo pipefail
          adb shell am instrument -w \
            -e class com.amin.pocketgba.NativeUpdateActivityTest \
            com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
            > "$RUNNER_TEMP/update-tests.txt"
          cat "$RUNNER_TEMP/update-tests.txt"
          grep -F 'OK (' "$RUNNER_TEMP/update-tests.txt"

      - name: Collect emulator diagnostics
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p emulator-diagnostics
          cp "$RUNNER_TEMP"/*.txt emulator-diagnostics/ 2>/dev/null || true
          cp "$RUNNER_TEMP/amin-emulator.log" emulator-diagnostics/ 2>/dev/null || true
          adb logcat -d > emulator-diagnostics/logcat.txt 2>/dev/null || true
          adb exec-out screencap -p > emulator-diagnostics/final-screen.png 2>/dev/null || true
          find emulator-diagnostics -maxdepth 2 -type f -print | sort

      - name: Upload emulator diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-emulator-diagnostics
          path: emulator-diagnostics/
          if-no-files-found: warn
          retention-days: 30
