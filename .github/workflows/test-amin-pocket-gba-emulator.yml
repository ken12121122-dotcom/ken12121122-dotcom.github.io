name: Test Amin Pocket GBA Android Emulator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-native-shell.js'
      - 'amin-vault/runtime-manifest.json'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-native-shell.js'
      - 'amin-vault/runtime-manifest.json'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-emulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build v0.9.2 app and instrumentation APKs
        run: |
          gradle --no-daemon --console=plain -p android-native \
            :app:assembleDebug \
            :app:assembleDebugAndroidTest

      - name: Build current main as v0.9.1 fixture
        shell: bash
        run: |
          git worktree add --detach /tmp/amin-pocket-main origin/main
          gradle --no-daemon --console=plain -p /tmp/amin-pocket-main/android-native :app:assembleDebug
          mkdir -p emulator-fixtures
          cp /tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk \
            emulator-fixtures/Amin-Pocket-GBA-v0.9.1-preview.apk
          cp android-native/app/build/outputs/apk/debug/app-debug.apk \
            emulator-fixtures/Amin-Pocket-GBA-v0.9.2-preview.apk
          cp android-native/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            emulator-fixtures/Amin-Pocket-GBA-v0.9.2-androidTest.apk

      - name: Upload emulator fixtures
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-emulator-fixtures
          path: emulator-fixtures/
          if-no-files-found: error
          retention-days: 7

  coexistence-and-launch:
    needs: build-fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Download emulator fixtures
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-emulator-fixtures
          path: emulator-fixtures

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Verify v0.9.1 and v0.9.2 coexist and launch
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 3072M
          heap-size: 512M
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -euxo pipefail
            OLD_APK='emulator-fixtures/Amin-Pocket-GBA-v0.9.1-preview.apk'
            NEW_APK='emulator-fixtures/Amin-Pocket-GBA-v0.9.2-preview.apk'
            OLD_PACKAGE='com.amin.pocketgba.preview091'
            NEW_PACKAGE='com.amin.pocketgba.preview092'

            adb install -r "$OLD_APK"
            adb install -r "$NEW_APK"

            adb shell pm list packages > packages.txt
            grep -F "package:${OLD_PACKAGE}" packages.txt
            grep -F "package:${NEW_PACKAGE}" packages.txt

            adb shell dumpsys package "$OLD_PACKAGE" > old-package.txt
            adb shell dumpsys package "$NEW_PACKAGE" > new-package.txt
            grep -F 'versionName=0.9.1-preview' old-package.txt
            grep -F 'versionName=0.9.2-preview' new-package.txt

            adb shell am start -W -n "${OLD_PACKAGE}/com.amin.pocketgba.MainActivity" > old-launch.txt
            cat old-launch.txt
            grep -F 'Status: ok' old-launch.txt
            adb shell am force-stop "$OLD_PACKAGE"

            adb shell am start -W -n "${NEW_PACKAGE}/com.amin.pocketgba.MainActivity" > new-launch.txt
            cat new-launch.txt
            grep -F 'Status: ok' new-launch.txt

  instrumentation-class:
    name: instrumentation-${{ matrix.id }}
    needs: build-fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: main-smoke
            class_name: com.amin.pocketgba.MainActivitySmokeTest
          - id: permission-center
            class_name: com.amin.pocketgba.PermissionCenterActivityTest
          - id: update-center
            class_name: com.amin.pocketgba.NativeUpdateActivityTest
    steps:
      - name: Download emulator fixtures
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-emulator-fixtures
          path: emulator-fixtures

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run ${{ matrix.id }} instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 3072M
          heap-size: 512M
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -euxo pipefail
            APP_APK='emulator-fixtures/Amin-Pocket-GBA-v0.9.2-preview.apk'
            TEST_APK='emulator-fixtures/Amin-Pocket-GBA-v0.9.2-androidTest.apk'
            TEST_CLASS='${{ matrix.class_name }}'
            adb install -r "$APP_APK"
            adb install -r "$TEST_APK"

            set +e
            adb shell am instrument -w \
              -e class "$TEST_CLASS" \
              com.amin.pocketgba.preview092.test/androidx.test.runner.AndroidJUnitRunner \
              > instrumentation-output.txt
            STATUS=$?
            set -e
            cat instrumentation-output.txt
            test "$STATUS" -eq 0
            grep -F 'OK (' instrumentation-output.txt

  native-deep-link:
    name: deep-link-${{ matrix.id }}
    needs: build-fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: permission-center
            uri: amin-permissions://open
            activity: PermissionCenterActivity
          - id: update-center
            uri: amin-update://check
            activity: NativeUpdateActivity
    steps:
      - name: Download emulator fixtures
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-emulator-fixtures
          path: emulator-fixtures

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Verify ${{ matrix.id }} deep link
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 3072M
          heap-size: 512M
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -euxo pipefail
            APP_APK='emulator-fixtures/Amin-Pocket-GBA-v0.9.2-preview.apk'
            PACKAGE='com.amin.pocketgba.preview092'
            adb install -r "$APP_APK"

            adb shell am start -W \
              -a android.intent.action.VIEW \
              -d '${{ matrix.uri }}' \
              -p "$PACKAGE" > deep-link-launch.txt
            cat deep-link-launch.txt
            grep -F 'Status: ok' deep-link-launch.txt

            sleep 1
            adb shell dumpsys activity activities > activity-state.txt
            grep -F '${{ matrix.activity }}' activity-state.txt
