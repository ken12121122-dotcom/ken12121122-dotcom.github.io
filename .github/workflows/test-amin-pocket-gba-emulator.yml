name: Test Amin Pocket GBA Android Emulator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-native-shell.js'
      - 'amin-vault/runtime-manifest.json'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-native-shell.js'
      - 'amin-vault/runtime-manifest.json'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-emulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emulator-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build v0.9.2 app and instrumentation APKs
        run: |
          gradle --no-daemon --console=plain -p android-native \
            :app:assembleDebug \
            :app:assembleDebugAndroidTest

      - name: Build current main as v0.9.1 coexistence fixture
        shell: bash
        run: |
          git worktree add --detach /tmp/amin-pocket-main origin/main
          gradle --no-daemon --console=plain -p /tmp/amin-pocket-main/android-native :app:assembleDebug
          test -f /tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk

      - name: Run emulator acceptance suite
        id: emulator
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 3072M
          heap-size: 512M
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -u
            EVIDENCE="$GITHUB_WORKSPACE/emulator-evidence"
            mkdir -p "$EVIDENCE"
            STATUS=0

            run_step() {
              local label="$1"
              shift
              echo "===== ${label} =====" | tee "$EVIDENCE/${label}.log"
              "$@" >> "$EVIDENCE/${label}.log" 2>&1
              local code=$?
              cat "$EVIDENCE/${label}.log"
              echo "exit_code=${code}" >> "$EVIDENCE/${label}.log"
              if [ "$code" -ne 0 ]; then
                STATUS=1
              fi
              return 0
            }

            assert_file_contains() {
              local label="$1"
              local pattern="$2"
              local file="$3"
              if grep -q "$pattern" "$file"; then
                echo "PASS: ${pattern}" | tee "$EVIDENCE/${label}.log"
              else
                echo "FAIL: ${pattern} not found in ${file}" | tee "$EVIDENCE/${label}.log"
                STATUS=1
              fi
            }

            OLD_APK='/tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk'
            NEW_APK="$GITHUB_WORKSPACE/android-native/app/build/outputs/apk/debug/app-debug.apk"
            OLD_PACKAGE='com.amin.pocketgba.preview091'
            NEW_PACKAGE='com.amin.pocketgba.preview092'

            run_step install-old adb install -r "$OLD_APK"
            run_step install-new adb install -r "$NEW_APK"

            adb shell pm list packages > "$EVIDENCE/packages.txt" 2>&1
            cat "$EVIDENCE/packages.txt"
            assert_file_contains package-old "package:${OLD_PACKAGE}" "$EVIDENCE/packages.txt"
            assert_file_contains package-new "package:${NEW_PACKAGE}" "$EVIDENCE/packages.txt"

            adb shell dumpsys package "$OLD_PACKAGE" > "$EVIDENCE/old-package.txt" 2>&1
            adb shell dumpsys package "$NEW_PACKAGE" > "$EVIDENCE/new-package.txt" 2>&1
            assert_file_contains old-version 'versionName=0.9.1-preview' "$EVIDENCE/old-package.txt"
            assert_file_contains new-version 'versionName=0.9.2-preview' "$EVIDENCE/new-package.txt"

            run_step old-launch adb shell am start -W -n "${OLD_PACKAGE}/com.amin.pocketgba.MainActivity"
            adb shell am force-stop "$OLD_PACKAGE" || true
            run_step new-launch adb shell am start -W -n "${NEW_PACKAGE}/com.amin.pocketgba.MainActivity"
            adb exec-out screencap -p > "$EVIDENCE/main-activity.png" 2> "$EVIDENCE/main-screenshot-error.txt" || STATUS=1
            adb shell am force-stop "$NEW_PACKAGE" || true

            set +e
            gradle --no-daemon --console=plain -p android-native :app:connectedDebugAndroidTest \
              > "$EVIDENCE/instrumentation.log" 2>&1
            TEST_STATUS=$?
            set +e
            cat "$EVIDENCE/instrumentation.log"
            echo "exit_code=${TEST_STATUS}" >> "$EVIDENCE/instrumentation.log"
            if [ "$TEST_STATUS" -ne 0 ]; then STATUS=1; fi

            run_step permission-deeplink adb shell am start -W \
              -a android.intent.action.VIEW \
              -d 'amin-permissions://open' \
              -p "$NEW_PACKAGE"
            sleep 2
            adb shell dumpsys activity activities > "$EVIDENCE/permission-activity.txt" 2>&1
            assert_file_contains permission-top 'PermissionCenterActivity' "$EVIDENCE/permission-activity.txt"
            adb exec-out screencap -p > "$EVIDENCE/permission-center.png" 2> "$EVIDENCE/permission-screenshot-error.txt" || STATUS=1

            adb shell am force-stop "$NEW_PACKAGE" || true
            run_step update-deeplink adb shell am start -W \
              -a android.intent.action.VIEW \
              -d 'amin-update://check' \
              -p "$NEW_PACKAGE"
            sleep 2
            adb shell dumpsys activity activities > "$EVIDENCE/update-activity.txt" 2>&1
            assert_file_contains update-top 'NativeUpdateActivity' "$EVIDENCE/update-activity.txt"
            adb exec-out screencap -p > "$EVIDENCE/update-center.png" 2> "$EVIDENCE/update-screenshot-error.txt" || STATUS=1

            printf '%s\n' "$STATUS" > "$EVIDENCE/result-code.txt"
            exit "$STATUS"

      - name: Package emulator evidence
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        run: |
          set -x
          if [ -d "$GITHUB_WORKSPACE/emulator-evidence" ]; then
            find "$GITHUB_WORKSPACE/emulator-evidence" -maxdepth 4 -type f -print | sort
            tar -czf emulator-evidence.tar.gz -C "$GITHUB_WORKSPACE" emulator-evidence
          else
            echo 'Emulator evidence directory is isolated by the runner action; acceptance remains visible in the action log.'
          fi

      - name: Upload emulator evidence
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-emulator-acceptance
          path: emulator-evidence.tar.gz
          if-no-files-found: warn
          retention-days: 30

      - name: Stop after emulator acceptance failure
        if: ${{ steps.emulator.outcome == 'failure' }}
        run: exit 1
