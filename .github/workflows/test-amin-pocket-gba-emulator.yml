name: Test Amin Pocket GBA Android Emulator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-native-shell.js'
      - 'amin-vault/runtime-manifest.json'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'
  push:
    paths:
      - 'android-native/**'
      - 'amin-vault/gba*.html'
      - 'amin-vault/amin-native-shell.js'
      - 'amin-vault/runtime-manifest.json'
      - '.github/workflows/test-amin-pocket-gba-emulator.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-emulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emulator-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build v0.9.2 app and instrumentation APKs
        run: |
          gradle --no-daemon --console=plain -p android-native \
            :app:assembleDebug \
            :app:assembleDebugAndroidTest

      - name: Build current main as v0.9.1 coexistence fixture
        shell: bash
        run: |
          git worktree add --detach /tmp/amin-pocket-main origin/main
          gradle --no-daemon --console=plain -p /tmp/amin-pocket-main/android-native :app:assembleDebug
          test -f /tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk

      - name: Run emulator acceptance suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 3072M
          heap-size: 512M
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -euo pipefail
            mkdir -p emulator-evidence

            OLD_APK='/tmp/amin-pocket-main/android-native/app/build/outputs/apk/debug/app-debug.apk'
            NEW_APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
            OLD_PACKAGE='com.amin.pocketgba.preview091'
            NEW_PACKAGE='com.amin.pocketgba.preview092'

            adb install -r "$OLD_APK"
            adb install -r "$NEW_APK"

            adb shell pm list packages | tee emulator-evidence/packages.txt
            grep -q "package:${OLD_PACKAGE}" emulator-evidence/packages.txt
            grep -q "package:${NEW_PACKAGE}" emulator-evidence/packages.txt

            adb shell dumpsys package "$OLD_PACKAGE" | tee emulator-evidence/old-package.txt
            adb shell dumpsys package "$NEW_PACKAGE" | tee emulator-evidence/new-package.txt
            grep -q 'versionName=0.9.1-preview' emulator-evidence/old-package.txt
            grep -q 'versionName=0.9.2-preview' emulator-evidence/new-package.txt

            adb shell am start -W -n "${OLD_PACKAGE}/com.amin.pocketgba.MainActivity" | tee emulator-evidence/old-launch.txt
            adb shell am force-stop "$OLD_PACKAGE"
            adb shell am start -W -n "${NEW_PACKAGE}/com.amin.pocketgba.MainActivity" | tee emulator-evidence/new-launch.txt
            adb exec-out screencap -p > emulator-evidence/main-activity.png
            adb shell am force-stop "$NEW_PACKAGE"

            gradle --no-daemon --console=plain -p android-native :app:connectedDebugAndroidTest

            adb shell am start -W \
              -a android.intent.action.VIEW \
              -d 'amin-permissions://open' \
              -p "$NEW_PACKAGE" | tee emulator-evidence/permission-deeplink.txt
            sleep 2
            adb shell dumpsys activity activities | tee emulator-evidence/permission-activity.txt
            grep -q 'PermissionCenterActivity' emulator-evidence/permission-activity.txt
            adb exec-out screencap -p > emulator-evidence/permission-center.png

            adb shell am force-stop "$NEW_PACKAGE"
            adb shell am start -W \
              -a android.intent.action.VIEW \
              -d 'amin-update://check' \
              -p "$NEW_PACKAGE" | tee emulator-evidence/update-deeplink.txt
            sleep 2
            adb shell dumpsys activity activities | tee emulator-evidence/update-activity.txt
            grep -q 'NativeUpdateActivity' emulator-evidence/update-activity.txt
            adb exec-out screencap -p > emulator-evidence/update-center.png

      - name: Upload emulator evidence and test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-emulator-acceptance
          path: |
            emulator-evidence/
            android-native/app/build/outputs/androidTest-results/
            android-native/app/build/reports/androidTests/
          if-no-files-found: warn
          retention-days: 30
