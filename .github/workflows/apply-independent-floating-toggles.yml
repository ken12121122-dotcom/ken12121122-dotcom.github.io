name: Apply independent floating toggles

on:
  push:
    branches:
      - feature/independent-floating-toggles
    paths:
      - '.github/workflows/apply-independent-floating-toggles.yml'

permissions:
  contents: write

jobs:
  patch-source:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/independent-floating-toggles
          fetch-depth: 0

      - name: Apply reviewed source transformation
        run: python3 tools/apply_independent_floating_toggles.py

      - name: Commit transformed sources
        shell: bash
        run: |
          set -euxo pipefail
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            android-native/app/src/main/java/com/amin/pocketgba/UniversalControlAccessibilityService.java \
            android-native/app/src/main/java/com/amin/pocketgba/FloatingVoiceController.java
          git commit -m 'feat: separate keyboard and voice floating lifecycles'
          git push origin HEAD:feature/independent-floating-toggles
