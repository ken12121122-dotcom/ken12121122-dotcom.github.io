name: Prepare Bridge 21 release source

on:
  push:
    branches:
      - release/bridge21-separate-floating-voice
    paths:
      - 'release/bridge21-trigger.txt'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump Bridge 21 identity
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android-native/app/build.gradle')
          source = path.read_text(encoding='utf-8')
          replacements = {
              '// Bridge 20 release source: Android 15 floating-bubble Voice Command launch repair.':
                  '// Bridge 21 release source: separate keyboard and tap-to-listen floating voice controls.',
              "orNull ?: '116'": "orNull ?: '117'",
              "orNull ?: '-bridge20'": "orNull ?: '-bridge21'",
          }
          for old, new in replacements.items():
              if source.count(old) != 1:
                  raise SystemExit(f'Expected one match for {old!r}, found {source.count(old)}')
              source = source.replace(old, new, 1)
          path.write_text(source, encoding='utf-8')
          PY
          rm release/bridge21-trigger.txt

      - name: Commit release identity
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add android-native/app/build.gradle release/bridge21-trigger.txt
          git commit -m 'release: prepare Bridge 21 identity'
          git push origin HEAD:release/bridge21-separate-floating-voice
