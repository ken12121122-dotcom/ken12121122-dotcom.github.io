name: Publish Amin Pocket GBA Bridge 15 Update

on:
  workflow_run:
    workflows:
      - Build Amin Pocket GBA Bridge 15
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'agent/amin-pocket-gba-universal-control-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Bridge 15 artifact
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge15
          path: /tmp/bridge15
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and publish
        shell: bash
        run: |
          set -euxo pipefail
          SRC='/tmp/bridge15/Amin-Pocket-GBA-v0.9.2-bridge15.apk'
          CERT='/tmp/bridge15/APK_SIGNING_CERTIFICATE.txt'
          test -s "$SRC"
          test -s "$CERT"
          grep -q 'PERMANENT SIGNING ENABLED' /tmp/bridge15/SIGNING_STATUS.txt
          grep -qi '3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$CERT"
          SHA="$(sha256sum "$SRC" | cut -d' ' -f1)"
          SIZE="$(stat -c '%s' "$SRC")"
          mkdir -p amin-vault/releases
          cp "$SRC" amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge15.apk

          python3 - "$SHA" "$SIZE" <<'PY'
          import json
          import sys
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          sha, size = sys.argv[1], int(sys.argv[2])
          taipei = timezone(timedelta(hours=8))
          manifest = {
              "format": "amin-native-release-manifest",
              "manifestVersion": 1,
              "channel": "bridge",
              "enabled": True,
              "packageId": "com.amin.pocketgba",
              "latestVersionName": "0.9.2-bridge15",
              "latestVersionCode": 111,
              "minimumSupportedVersionCode": 107,
              "minimumAndroidSdk": 26,
              "apkUrl": "https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge15.apk",
              "apkSha256": sha,
              "signerCertificateSha256": "3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7",
              "sizeBytes": size,
              "publishedAt": datetime.now(taipei).isoformat(timespec="seconds"),
              "mandatory": False,
              "releaseNotes": [
                  "修正 GBA 十字鍵在部分 Samsung 手機只顯示上下鍵的問題。",
                  "十字鍵改為固定 3×3 浮動容器，左、右鍵不再受到視窗量測裁切。",
                  "保留純按鍵配置、喚醒球、兩秒淡化、自動收合與游標操作。"
              ]
          }
          Path('amin-vault/native-release-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Commit update channel
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json \
                  amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge15.apk
          git commit -m 'Publish signed Bridge 15 code 111 fixed D-pad'
          git push origin HEAD:main
