name: Publish Amin Pocket GBA Bridge 17 Update

on:
  workflow_run:
    workflows:
      - Build Amin Pocket GBA Bridge 17
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'ai/voice-command-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download Bridge 17 artifact
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge17
          path: /tmp/bridge17
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and publish Bridge 17
        shell: bash
        run: |
          set -euxo pipefail
          SRC='/tmp/bridge17/Amin-Pocket-GBA-v0.9.2-bridge17.apk'
          CERT='/tmp/bridge17/APK_SIGNING_CERTIFICATE.txt'
          test -s "$SRC"
          test -s "$CERT"
          grep -q 'PERMANENT SIGNING ENABLED' /tmp/bridge17/SIGNING_STATUS.txt
          grep -qi '3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$CERT"
          SHA="$(sha256sum "$SRC" | cut -d' ' -f1)"
          SIZE="$(stat -c '%s' "$SRC")"
          mkdir -p amin-vault/releases
          cp "$SRC" amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge17.apk

          python3 - "$SHA" "$SIZE" <<'PY'
          import json
          import sys
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          sha, size = sys.argv[1], int(sys.argv[2])
          taipei = timezone(timedelta(hours=8))
          manifest = {
              "format": "amin-native-release-manifest",
              "manifestVersion": 1,
              "channel": "bridge",
              "enabled": True,
              "packageId": "com.amin.pocketgba",
              "latestVersionName": "0.9.2-bridge17",
              "latestVersionCode": 113,
              "minimumSupportedVersionCode": 107,
              "minimumAndroidSdk": 26,
              "apkUrl": "https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge17.apk",
              "apkSha256": sha,
              "signerCertificateSha256": "3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7",
              "sizeBytes": size,
              "publishedAt": datetime.now(taipei).isoformat(timespec="seconds"),
              "mandatory": False,
              "releaseNotes": [
                  "新增 Amin 語音指令入口，採使用者主動啟動的按住說話流程。",
                  "支援開關控制盤、游標與捲動模式、返回、首頁、開啟 GBA 與控制器設定。",
                  "語音功能整合於原 Amin Pocket GBA，維持正式套件 com.amin.pocketgba。",
                  "Runtime 維持 0.9.2-rc19。"
              ]
          }
          Path('amin-vault/native-release-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Commit Bridge 17 update channel
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json \
                  amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge17.apk
          git commit -m 'Publish signed Bridge 17 code 113 voice command update'
          git push origin HEAD:main
