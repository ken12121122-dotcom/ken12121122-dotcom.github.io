name: Build Amin Pocket GBA Universal Control

on:
  workflow_dispatch:
  push:
    branches:
      - agent/amin-pocket-gba-universal-control-v01
    paths:
      - 'android-native/**'
      - '.github/workflows/build-amin-pocket-gba-universal-control.yml'

permissions:
  contents: read

concurrency:
  group: amin-pocket-gba-universal-control-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-bridge14:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      AMIN_KEYSTORE_BASE64: ${{ secrets.AMIN_KEYSTORE_BASE64 }}
      AMIN_KEYSTORE_PASSWORD: ${{ secrets.AMIN_KEYSTORE_PASSWORD }}
      AMIN_KEY_ALIAS: ${{ secrets.AMIN_KEY_ALIAS }}
      AMIN_KEY_PASSWORD: ${{ secrets.AMIN_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 tools
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Prepare permanent signing
        id: signing
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${AMIN_KEYSTORE_BASE64:-}" \
             && -n "${AMIN_KEYSTORE_PASSWORD:-}" \
             && -n "${AMIN_KEY_ALIAS:-}" \
             && -n "${AMIN_KEY_PASSWORD:-}" ]]; then
            KEYSTORE_PATH="$RUNNER_TEMP/amin-pocket-gba.jks"
            printf '%s' "$AMIN_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            test -s "$KEYSTORE_PATH"
            echo "AMIN_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle official EmulatorJS 4.2.3 and mGBA core
        shell: bash
        run: |
          set -euxo pipefail
          ARCHIVE="$RUNNER_TEMP/emulatorjs-v4.2.3.tar.gz"
          EXTRACT="$RUNNER_TEMP/emulatorjs-v4.2.3"
          MIN_ZIP="$RUNNER_TEMP/emulator.min.zip"
          TARGET='android-native/app/src/main/assets/emulator'

          curl --fail --location --retry 4 --retry-delay 2 \
            'https://codeload.github.com/EmulatorJS/EmulatorJS/tar.gz/refs/tags/v4.2.3' \
            --output "$ARCHIVE"
          rm -rf "$EXTRACT" "$TARGET"
          mkdir -p "$EXTRACT" "$TARGET/cores"
          tar -xzf "$ARCHIVE" -C "$EXTRACT" --strip-components=1
          cp -a "$EXTRACT/data/." "$TARGET/"
          cp "$EXTRACT/LICENSE" "$TARGET/EMULATORJS-LICENSE.txt"

          curl --fail --location --retry 4 --retry-delay 2 \
            'https://cdn.emulatorjs.org/4.2.3/data/emulator.min.zip' \
            --output "$MIN_ZIP"
          unzip -o "$MIN_ZIP" -d "$TARGET"

          curl --fail --location --retry 4 --retry-delay 2 \
            'https://cdn.emulatorjs.org/4.2.3/data/cores/mgba-wasm.data' \
            --output "$TARGET/cores/mgba-wasm.data"

          test -s "$TARGET/loader.js"
          test -s "$TARGET/emulator.min.js"
          test -s "$TARGET/emulator.min.css"
          test -s "$TARGET/cores/mgba-wasm.data"

      - name: Validate GBA-style control v0.3 source
        shell: bash
        run: |
          set -euxo pipefail
          grep -q 'class LaunchGateActivity' android-native/app/src/main/java/com/amin/pocketgba/LaunchGateActivity.java
          grep -q 'class NativeCartridgeVaultBridge' android-native/app/src/main/java/com/amin/pocketgba/NativeCartridgeVaultBridge.java
          grep -q 'class UniversalControlAccessibilityService' android-native/app/src/main/java/com/amin/pocketgba/UniversalControlAccessibilityService.java
          grep -q 'FrameLayout actionOverlay' android-native/app/src/main/java/com/amin/pocketgba/UniversalControlAccessibilityService.java
          grep -q 'createShoulderOverlays' android-native/app/src/main/java/com/amin/pocketgba/UniversalControlAccessibilityService.java
          grep -q 'createCenterOverlay' android-native/app/src/main/java/com/amin/pocketgba/UniversalControlAccessibilityService.java
          grep -q 'GBA 全域控制 v0.3' android-native/app/src/main/java/com/amin/pocketgba/UniversalControlSetupActivity.java
          grep -q 'android:canPerformGestures="true"' android-native/app/src/main/res/xml/universal_control_accessibility_service.xml
          grep -q 'android:name=".UniversalControlAccessibilityService"' android-native/app/src/main/AndroidManifest.xml
          grep -q 'Math.min(4, content.getChildCount())' android-native/app/src/main/java/com/amin/pocketgba/AminPocketApplication.java

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Prepare Bridge 14 label
        shell: bash
        run: |
          set -euxo pipefail
          sed -i 's/Amin Pocket GBA Bridge 0.9.2 B3/Amin Pocket GBA Bridge 0.9.2 B14/g' android-native/app/build.gradle

      - name: Build and lint Bridge 14
        shell: bash
        run: |
          set -euxo pipefail
          gradle --no-daemon --console=plain -p android-native \
            -PAMIN_VERSION_CODE=110 \
            -PAMIN_PREVIEW_SUFFIX=-bridge14 \
            :app:assembleDebug \
            :app:lintDebug

      - name: Inspect Bridge 14 APK
        shell: bash
        run: |
          set -euxo pipefail
          APK='android-native/app/build/outputs/apk/debug/app-debug.apk'
          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt2"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          "$AAPT" dump badging "$APK" | tee /tmp/apk-badging.txt
          grep -q "package: name='com.amin.pocketgba' versionCode='110' versionName='0.9.2-bridge14'" /tmp/apk-badging.txt
          grep -q "application-label:'Amin Pocket GBA Bridge 0.9.2 B14'" /tmp/apk-badging.txt
          "$AAPT" dump permissions "$APK" | tee /tmp/apk-permissions.txt
          grep -q 'android.permission.UPDATE_PACKAGES_WITHOUT_USER_ACTION' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.CAMERA' /tmp/apk-permissions.txt
          ! grep -q 'android.permission.RECORD_AUDIO' /tmp/apk-permissions.txt
          "$AAPT" dump xmltree --file AndroidManifest.xml "$APK" | tee /tmp/apk-manifest.txt
          grep -q 'LaunchGateActivity' /tmp/apk-manifest.txt
          grep -q 'UniversalControlAccessibilityService' /tmp/apk-manifest.txt
          grep -q 'UniversalControlSetupActivity' /tmp/apk-manifest.txt
          unzip -l "$APK" | tee /tmp/apk-files.txt
          grep -q 'assets/emulator/loader.js' /tmp/apk-files.txt
          grep -q 'assets/emulator/cores/mgba-wasm.data' /tmp/apk-files.txt
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee /tmp/apk-signing.txt

      - name: Package Bridge 14 artifact
        id: package
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          if [[ '${{ steps.signing.outputs.ready }}' == 'true' ]]; then
            FILE='Amin-Pocket-GBA-v0.9.2-bridge14.apk'
            ARTIFACT='Amin-Pocket-GBA-v0.9.2-bridge14'
            STATUS='PERMANENT SIGNING ENABLED: panel-free GBA floating controls v0.3.'
          else
            FILE='Amin-Pocket-GBA-v0.9.2-bridge14-CI-ONLY.apk'
            ARTIFACT='Amin-Pocket-GBA-v0.9.2-bridge14-CI-ONLY-NOT-UPDATABLE'
            STATUS='CI DEBUG SIGNING ONLY.'
          fi
          cp android-native/app/build/outputs/apk/debug/app-debug.apk "dist/$FILE"
          printf '%s\n' "$STATUS" > dist/SIGNING_STATUS.txt
          cp /tmp/apk-signing.txt dist/APK_SIGNING_CERTIFICATE.txt
          cd dist
          sha256sum "$FILE" > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt
          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload Bridge 14 APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
