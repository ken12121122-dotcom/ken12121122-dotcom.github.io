name: Publish Amin Pocket GBA Bridge 12 Update

on:
  workflow_run:
    workflows:
      - Build Amin Pocket GBA Universal Control
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish-update-test:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'agent/amin-pocket-gba-universal-control-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified Bridge 12 artifact
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge12
          path: /tmp/bridge12
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and publish update files
        shell: bash
        run: |
          set -euxo pipefail
          SRC='/tmp/bridge12/Amin-Pocket-GBA-v0.9.2-bridge12.apk'
          CERT='/tmp/bridge12/APK_SIGNING_CERTIFICATE.txt'
          test -s "$SRC"
          test -s "$CERT"
          grep -q 'PERMANENT SIGNING ENABLED' /tmp/bridge12/SIGNING_STATUS.txt
          grep -qi 'Signer #1 certificate SHA-256 digest: 3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$CERT"
          SHA="$(sha256sum "$SRC" | cut -d' ' -f1)"
          SIZE="$(stat -c '%s' "$SRC")"
          test "${#SHA}" -eq 64
          mkdir -p amin-vault/releases
          cp "$SRC" amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge12.apk

          python3 - "$SHA" "$SIZE" <<'PY'
          import json
          import sys
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          sha, size = sys.argv[1], int(sys.argv[2])
          taipei = timezone(timedelta(hours=8))
          manifest = {
              "format": "amin-native-release-manifest",
              "manifestVersion": 1,
              "channel": "bridge",
              "enabled": True,
              "packageId": "com.amin.pocketgba",
              "latestVersionName": "0.9.2-bridge12",
              "latestVersionCode": 108,
              "minimumSupportedVersionCode": 107,
              "minimumAndroidSdk": 26,
              "apkUrl": "https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge12.apk",
              "apkSha256": sha,
              "signerCertificateSha256": "3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7",
              "sizeBytes": size,
              "publishedAt": datetime.now(taipei).isoformat(timespec="seconds"),
              "mandatory": False,
              "releaseNotes": [
                  "修正全域控制盤入口未顯示：按鈕固定放在控制中心上方，回到頁面時會再次確認掛載。",
                  "保留長按 B 回桌面、長按左右切換桌面頁、方向鍵移動游標與 A 點擊功能。",
                  "保留 Native Cartridge Vault v2、Android .sav/.bak 與內建 EmulatorJS 4.2.3 mGBA。"
              ]
          }
          Path('amin-vault/native-release-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Commit update channel to main
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json \
                  amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge12.apk
          git commit -m 'Publish signed Bridge 12 code 108 Universal Control entry fix'
          git push origin HEAD:main
