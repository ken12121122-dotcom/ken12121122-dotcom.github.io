name: Publish Amin Pocket GBA Bridge 8 Update

on:
  workflow_run:
    workflows:
      - Build Amin Pocket GBA Android
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish-update-test:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'agent/amin-pocket-gba-bridge2-update-test'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified Bridge 8 artifact
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge8
          path: /tmp/bridge8
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and publish update files
        shell: bash
        run: |
          set -euxo pipefail
          SRC='/tmp/bridge8/Amin-Pocket-GBA-v0.9.2-bridge8.apk'
          CERT='/tmp/bridge8/APK_SIGNING_CERTIFICATE.txt'
          test -s "$SRC"
          test -s "$CERT"
          grep -q 'PERMANENT SIGNING ENABLED' /tmp/bridge8/SIGNING_STATUS.txt
          grep -qi 'Signer #1 certificate SHA-256 digest: 3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$CERT"
          SHA="$(sha256sum "$SRC" | cut -d' ' -f1)"
          SIZE="$(stat -c '%s' "$SRC")"
          test "${#SHA}" -eq 64

          mkdir -p amin-vault/releases
          cp "$SRC" amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge8.apk

          python3 - "$SHA" "$SIZE" <<'PY'
          import json
          import sys
          from pathlib import Path

          sha, size = sys.argv[1], int(sys.argv[2])
          manifest = {
              "format": "amin-native-release-manifest",
              "manifestVersion": 1,
              "channel": "bridge",
              "enabled": True,
              "packageId": "com.amin.pocketgba",
              "latestVersionName": "0.9.2-bridge8",
              "latestVersionCode": 104,
              "minimumSupportedVersionCode": 103,
              "minimumAndroidSdk": 26,
              "apkUrl": "https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge8.apk",
              "apkSha256": sha,
              "signerCertificateSha256": "3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7",
              "sizeBytes": size,
              "publishedAt": "2026-07-19T10:50:00+08:00",
              "mandatory": False,
              "releaseNotes": [
                  "新增真正的 Android 私有存檔保險庫，每份存檔保留目前版與上一版副本。",
                  "新增 ROM 雙層鏡像與自動修復，降低更新後遊戲檔遺失風險。",
                  "新增 mGBA 啟動監看與官方穩定通道備援，黑畫面或核心逾時會自動復原。"
              ]
          }
          Path('amin-vault/native-release-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Commit update channel to main
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json \
                  amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge8.apk
          git commit -m 'Publish signed Bridge 8 code 104 GBA reliability vault'
          git push origin HEAD:main
