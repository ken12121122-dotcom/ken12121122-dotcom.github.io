name: Publish Amin Pocket GBA Bridge 13 Update

on:
  workflow_run:
    workflows:
      - Build Amin Pocket GBA Universal Control
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish-update-test:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'agent/amin-pocket-gba-universal-control-v01'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified Bridge 13 artifact
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge13
          path: /tmp/bridge13
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and publish update files
        shell: bash
        run: |
          set -euxo pipefail
          SRC='/tmp/bridge13/Amin-Pocket-GBA-v0.9.2-bridge13.apk'
          CERT='/tmp/bridge13/APK_SIGNING_CERTIFICATE.txt'
          test -s "$SRC"
          test -s "$CERT"
          grep -q 'PERMANENT SIGNING ENABLED' /tmp/bridge13/SIGNING_STATUS.txt
          grep -qi 'Signer #1 certificate SHA-256 digest: 3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$CERT"
          SHA="$(sha256sum "$SRC" | cut -d' ' -f1)"
          SIZE="$(stat -c '%s' "$SRC")"
          test "${#SHA}" -eq 64
          mkdir -p amin-vault/releases
          cp "$SRC" amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge13.apk

          python3 - "$SHA" "$SIZE" <<'PY'
          import json
          import sys
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          sha, size = sys.argv[1], int(sys.argv[2])
          taipei = timezone(timedelta(hours=8))
          manifest = {
              "format": "amin-native-release-manifest",
              "manifestVersion": 1,
              "channel": "bridge",
              "enabled": True,
              "packageId": "com.amin.pocketgba",
              "latestVersionName": "0.9.2-bridge13",
              "latestVersionCode": 109,
              "minimumSupportedVersionCode": 107,
              "minimumAndroidSdk": 26,
              "apkUrl": "https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge13.apk",
              "apkSha256": sha,
              "signerCertificateSha256": "3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7",
              "sizeBytes": size,
              "publishedAt": datetime.now(taipei).isoformat(timespec="seconds"),
              "mandatory": False,
              "releaseNotes": [
                  "新增可拖曳的浮動喚醒球：點一下展開或收起控制盤，閒置 2 秒後自動淡化。",
                  "控制盤新增首頁、最近使用、頁面上下滑、游標長按與立即收合，並可設定自動收合時間。",
                  "無障礙服務只需首次由 Android 設定啟用，之後可在 App 內暫停或恢復浮動控制。"
              ]
          }
          Path('amin-vault/native-release-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Commit update channel to main
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json \
                  amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge13.apk
          git commit -m 'Publish signed Bridge 13 code 109 Universal Control v0.2'
          git push origin HEAD:main
