name: Publish Amin Pocket GBA Bridge 4 Update

on:
  workflow_run:
    workflows:
      - Build Amin Pocket GBA Android
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  publish-update-test:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'agent/amin-pocket-gba-bridge2-update-test'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified Bridge 4 artifact
        uses: actions/download-artifact@v4
        with:
          name: Amin-Pocket-GBA-v0.9.2-bridge4
          path: /tmp/bridge4
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and publish update files
        shell: bash
        run: |
          set -euxo pipefail
          SRC='/tmp/bridge4/Amin-Pocket-GBA-v0.9.2-bridge4.apk'
          CERT='/tmp/bridge4/APK_SIGNING_CERTIFICATE.txt'
          test -s "$SRC"
          test -s "$CERT"
          grep -q 'PERMANENT SIGNING ENABLED' /tmp/bridge4/SIGNING_STATUS.txt
          grep -qi 'Signer #1 certificate SHA-256 digest: 3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7' "$CERT"
          SHA="$(sha256sum "$SRC" | cut -d' ' -f1)"
          SIZE="$(stat -c '%s' "$SRC")"
          test "${#SHA}" -eq 64

          mkdir -p amin-vault/releases
          cp "$SRC" amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge4.apk

          python3 - "$SHA" "$SIZE" <<'PY'
          import json
          import sys
          from pathlib import Path

          sha, size = sys.argv[1], int(sys.argv[2])
          manifest = {
              "format": "amin-native-release-manifest",
              "manifestVersion": 1,
              "channel": "bridge",
              "enabled": True,
              "packageId": "com.amin.pocketgba",
              "latestVersionName": "0.9.2-bridge4",
              "latestVersionCode": 100,
              "minimumSupportedVersionCode": 99,
              "minimumAndroidSdk": 26,
              "apkUrl": "https://ken12121122-dotcom.github.io/amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge4.apk",
              "apkSha256": sha,
              "signerCertificateSha256": "3b9a3125b2cd19389c284e834c4ff9eb67caeecb647fe41897d923169f4152c7",
              "sizeBytes": size,
              "publishedAt": "2026-07-18T23:40:00+08:00",
              "mandatory": False,
              "releaseNotes": [
                  "Bridge 4 新增遊戲式啟動閘門。",
                  "每次開啟 App 都會先顯示進度條並自動檢查更新。",
                  "有新版時直接進入下載、驗證與安裝；無新版或離線時自動進入主畫面。"
              ]
          }
          Path('amin-vault/native-release-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY

      - name: Commit update channel to main
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add amin-vault/native-release-manifest.json \
                  amin-vault/releases/Amin-Pocket-GBA-v0.9.2-bridge4.apk
          git commit -m 'Publish signed Bridge 4 code 100 launch gate'
          git push origin HEAD:main
